<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>تحدي المعلومات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0a0a0f;
  color: #f0f0ff;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  padding: 12px;
  min-height: 100vh;
}

.screen {
  display: none;
  max-width: 500px;
  margin: 0 auto;
}

.screen.active {
  display: block;
}

.card {
  background: #13131a;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

h1 {
  font-size: 28px;
  text-align: center;
  background: linear-gradient(135deg, #7c6fff, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #9090b0;
  font-size: 13px;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 14px;
  background: #1c1c27;
  border: 1px solid #2a2a35;
  border-radius: 12px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  margin: 8px 0;
  text-align: right;
}

input:focus, select:focus {
  outline: none;
  border-color: #7c6fff;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin: 8px 0;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, #7c6fff, #5b4fd4);
  color: white;
}

.btn-secondary {
  background: #1c1c27;
  color: white;
  border: 1px solid #2a2a35;
}

.room-code {
  font-size: 32px;
  font-weight: 900;
  text-align: center;
  background: #1c1c27;
  padding: 20px;
  border-radius: 16px;
  letter-spacing: 8px;
  font-family: monospace;
  margin: 15px 0;
  direction: ltr;
  border: 2px dashed rgba(255,209,102,0.3);
  color: #ffd166;
}

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 15px 0;
  color: #9090b0;
  font-size: 12px;
}

.divider hr {
  flex: 1;
  height: 1px;
  background: #2a2a35;
  border: none;
}

.scoreboard {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 15px;
}

.player-card {
  background: #1c1c27;
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  flex: 1;
  border: 1.5px solid #2a2a35;
}

.player-card.active {
  border-color: #7c6fff;
  box-shadow: 0 0 10px rgba(124,111,255,0.2);
}

.player-name {
  font-size: 12px;
  color: #9090b0;
  margin-bottom: 5px;
}

.player-score {
  font-size: 28px;
  font-weight: 900;
}

.player-score.green {
  color: #06d6a0;
}

.player-score.red {
  color: #ef4565;
}

.round-info {
  text-align: center;
  background: #1c1c27;
  border-radius: 16px;
  padding: 12px;
  min-width: 80px;
}

.round-label {
  font-size: 10px;
  color: #9090b0;
}

.round-number {
  font-size: 20px;
  font-weight: 900;
}

.timer-container {
  margin: 15px 0;
}

.timer-bar {
  height: 8px;
  background: #1c1c27;
  border-radius: 10px;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  width: 100%;
  background: #06d6a0;
  border-radius: 10px;
  transition: width 1s linear;
}

.timer-fill.warning {
  background: #ffd166;
}

.timer-fill.danger {
  background: #ef4565;
}

.timer-text {
  text-align: center;
  font-size: 14px;
  margin-top: 5px;
  color: #9090b0;
}

.q-card {
  background: #1c1c27;
  border-radius: 16px;
  padding: 20px;
  margin: 15px 0;
}

.q-category {
  color: #7c6fff;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 5px;
}

.q-text {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.5;
  margin: 15px 0;
}

.choice-btn {
  width: 100%;
  padding: 14px;
  background: #13131a;
  border: 1.5px solid #2a2a35;
  border-radius: 12px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  margin: 6px 0;
  text-align: center;
  cursor: pointer;
}

.choice-btn:active {
  transform: scale(0.98);
}

.choice-btn.correct {
  background: rgba(6,214,160,0.2);
  border-color: #06d6a0;
  color: #06d6a0;
}

.choice-btn.wrong {
  background: rgba(239,69,101,0.15);
  border-color: #ef4565;
  color: #ef4565;
}

.choice-btn:disabled {
  opacity: 0.5;
}

.powerups {
  display: flex;
  gap: 8px;
  margin: 10px 0;
}

.powerup-btn {
  flex: 1;
  padding: 10px;
  background: #1c1c27;
  border: 1px solid #2a2a35;
  border-radius: 12px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.powerup-btn:disabled {
  opacity: 0.3;
}

.chat-container {
  background: #1c1c27;
  border-radius: 16px;
  overflow: hidden;
  margin-top: 10px;
}

.chat-messages {
  height: 100px;
  overflow-y: auto;
  padding: 10px;
}

.chat-message {
  font-size: 12px;
  padding: 6px 10px;
  margin: 4px 0;
  border-radius: 10px;
  max-width: 85%;
  word-break: break-word;
}

.chat-message.me {
  background: rgba(124,111,255,0.2);
  color: #7c6fff;
  align-self: flex-start;
}

.chat-message.them {
  background: #13131a;
  color: #9090b0;
  align-self: flex-end;
  text-align: left;
}

.reactions {
  display: flex;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid #2a2a35;
  justify-content: center;
}

.react-emoji {
  font-size: 20px;
  background: #13131a;
  border: none;
  padding: 6px 10px;
  border-radius: 30px;
  cursor: pointer;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid #2a2a35;
}

.chat-input-row input {
  flex: 1;
  margin: 0;
  padding: 10px;
  font-size: 13px;
}

.chat-input-row button {
  padding: 10px 16px;
  background: #7c6fff;
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 700;
}

.result-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.result-card {
  background: #13131a;
  border-radius: 24px;
  padding: 30px;
  text-align: center;
  width: 90%;
  max-width: 320px;
  border: 1px solid rgba(255,255,255,0.1);
}

.result-emoji {
  font-size: 60px;
  margin-bottom: 10px;
}

.result-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 8px;
}

.result-sub {
  color: #9090b0;
  margin-bottom: 20px;
}

.final-scores {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 20px;
}

.final-score-item {
  text-align: center;
}

.final-score-name {
  font-size: 12px;
  color: #9090b0;
}

.final-score-value {
  font-size: 32px;
  font-weight: 900;
}

.final-score-value.winner {
  color: #ffd166;
}

.notif {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c27;
  border: 1px solid #2a2a35;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  z-index: 100;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}

.notif.success {
  border-color: #06d6a0;
  color: #06d6a0;
}

.notif.error {
  border-color: #ef4565;
  color: #ef4565;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin: 0 auto 5px;
}

.dot-waiting {
  background: #ffd166;
  animation: pulse 1s infinite;
}

.dot-ready {
  background: #06d6a0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.hidden {
  display: none;
}

.text-center {
  text-align: center;
}
</style>
</head>
<body>

<!-- الشاشة الرئيسية -->
<div id="screen-home" class="screen active">
  <div class="card">
    <h1>⚡ تحدي المعلومات</h1>
    <div class="subtitle">العب ضد صديقك من أي مكان</div>
    
    <input type="text" id="player-name" placeholder="اسمك" maxlength="15">
    
    <select id="category">
      <option value="general">🌍 معلومات عامة</option>
      <option value="sports">⚽ رياضة</option>
      <option value="history">📜 تاريخ</option>
      <option value="science">🔬 علوم</option>
      <option value="arab">🗺️ الوطن العربي</option>
    </select>
    
    <button class="btn btn-primary" onclick="createRoom()">🏠 إنشاء غرفة جديدة</button>
    
    <div class="divider"><hr><span>أو</span><hr></div>
    
    <input type="text" id="join-code" placeholder="كود الغرفة (6 أحرف)" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:4px;font-family:monospace">
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 انضم إلى غرفة</button>
  </div>
</div>

<!-- شاشة الانتظار -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <div class="text-center">
      <div style="color:#9090b0;font-size:12px">كود الغرفة</div>
      <div class="room-code" id="room-code-display">------</div>
      <button class="btn btn-secondary" onclick="copyCode()" style="margin-top:10px">📋 نسخ الكود</button>
    </div>
    
    <div class="scoreboard" style="margin-top:20px">
      <div class="player-card">
        <div id="p1-dot" class="status-dot dot-waiting"></div>
        <div class="player-name">اللاعب 1</div>
        <div id="p1-name" style="font-weight:700">—</div>
      </div>
      <div class="player-card">
        <div id="p2-dot" class="status-dot dot-waiting"></div>
        <div class="player-name">اللاعب 2</div>
        <div id="p2-name" style="font-weight:700">في الانتظار...</div>
      </div>
    </div>
    
    <div id="lobby-waiting">
      <div class="text-center" style="color:#9090b0;padding:20px">
        ⏳ في انتظار المنافس...
      </div>
    </div>
    
    <div id="lobby-start" class="hidden">
      <button class="btn btn-primary" onclick="startGame()">🚀 ابدأ اللعبة</button>
    </div>
    
    <button class="btn btn-secondary" onclick="leaveRoom()">← رجوع</button>
  </div>
</div>

<!-- شاشة اللعبة -->
<div id="screen-game" class="screen">
  <div class="card" style="padding:15px">
    <div class="scoreboard">
      <div class="player-card" id="player1-card">
        <div class="player-name" id="name-p1">اللاعب 1</div>
        <div class="player-score green" id="score-p1">0</div>
      </div>
      <div class="round-info">
        <div class="round-label">الجولة</div>
        <div class="round-number" id="round-num">0/10</div>
      </div>
      <div class="player-card" id="player2-card">
        <div class="player-name" id="name-p2">اللاعب 2</div>
        <div class="player-score green" id="score-p2">0</div>
      </div>
    </div>
    
    <div class="timer-container">
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
      </div>
      <div class="timer-text" id="timer-text">— ثانية</div>
    </div>
    
    <div class="q-card">
      <div class="q-category" id="q-cat">معلومات عامة</div>
      <div class="q-text" id="q-text">في انتظار بدء اللعبة...</div>
      <div id="choices-container"></div>
    </div>
    
    <div class="powerups">
      <button class="powerup-btn" id="skip-btn" onclick="useSkip()">⏭ تخطي</button>
      <button class="powerup-btn" id="double-btn" onclick="useDouble()">⚡ ×2</button>
      <button class="powerup-btn" id="hint-btn" onclick="useHint()">💡 50/50</button>
    </div>
    
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="reactions">
        <button class="react-emoji" onclick="sendReaction('🔥')">🔥</button>
        <button class="react-emoji" onclick="sendReaction('😂')">😂</button>
        <button class="react-emoji" onclick="sendReaction('👏')">👏</button>
        <button class="react-emoji" onclick="sendReaction('💀')">💀</button>
        <button class="react-emoji" onclick="sendReaction('🤔')">🤔</button>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="اكتب رسالة..." maxlength="60" onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()">إرسال</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== Firebase Config ====================
const firebaseConfig = {
  apiKey: "AIzaSyAZkQmg9k3RXoaCU3E2tP-jHcXIYwNpLJA",
  authDomain: "bero-a2b6b.firebaseapp.com",
  databaseURL: "https://bero-a2b6b-default-rtdb.firebaseio.com",
  projectId: "bero-a2b6b",
  storageBucket: "bero-a2b6b.firebasestorage.app",
  messagingSenderId: "959500982230",
  appId: "1:959500982230:web:0e292eec3297e363e77677"
};

// ==================== الأسئلة ====================
const QUESTIONS = {
  general: [
    { q: "ما هي عاصمة مصر؟", c: ["الإسكندرية", "القاهرة", "الجيزة", "أسوان"], a: "القاهرة" },
    { q: "كم عدد ألوان قوس قزح؟", c: ["5", "6", "7", "8"], a: "7" },
    { q: "ما هو أكبر محيط في العالم؟", c: ["الأطلسي", "الهندي", "الهادئ", "المتجمد"], a: "الهادئ" },
    { q: "الذهب رمزه الكيميائي Au", c: ["صح", "خطأ"], a: "صح" },
    { q: "ما هي أصغر دولة في العالم؟", c: ["موناكو", "الفاتيكان", "سان مارينو", "مالطا"], a: "الفاتيكان" },
    { q: "كم عدد قارات العالم؟", c: ["5", "6", "7", "8"], a: "7" }
  ],
  sports: [
    { q: "كم عدد لاعبي كرة القدم داخل الملعب؟", c: ["20", "22", "24", "26"], a: "22" },
    { q: "من فاز بجائزة الكرة الذهبية 2022؟", c: ["ميسي", "رونالدو", "مبابي", "بنزيما"], a: "ميسي" },
    { q: "منتخب أي دولة فاز بكأس العالم 2018؟", c: ["البرازيل", "ألمانيا", "فرنسا", "إسبانيا"], a: "فرنسا" },
    { q: "محمد صلاح لاعب من أي دولة؟", c: ["المغرب", "تونس", "مصر", "الجزائر"], a: "مصر" }
  ],
  history: [
    { q: "في أي عام انتهت الحرب العالمية الثانية؟", c: ["1943", "1944", "1945", "1946"], a: "1945" },
    { q: "من بنى الأهرامات؟", c: ["الفراعنة", "الرومان", "اليونان", "العرب"], a: "الفراعنة" },
    { q: "من قاد فتح الأندلس؟", c: ["طارق بن زياد", "موسى بن نصير", "عقبة بن نافع", "خالد بن الوليد"], a: "طارق بن زياد" }
  ],
  science: [
    { q: "ما هو أكبر كوكب في المجموعة الشمسية؟", c: ["المريخ", "المشتري", "زحل", "الأرض"], a: "المشتري" },
    { q: "ما هو رمز عنصر الأكسجين؟", c: ["O", "Ox", "Om", "Og"], a: "O" },
    { q: "الضوء يسير أسرع من الصوت", c: ["صح", "خطأ"], a: "صح" }
  ],
  arab: [
    { q: "ما هي أكبر دولة عربية من حيث المساحة؟", c: ["السعودية", "الجزائر", "مصر", "السودان"], a: "الجزائر" },
    { q: "ما هي عاصمة الإمارات؟", c: ["دبي", "أبوظبي", "الشارقة", "عجمان"], a: "أبوظبي" },
    { q: "نهر النيل يمر بعدد من الدول العربية منها؟", c: ["مصر والسودان", "المغرب والجزائر", "سوريا والأردن", "السعودية واليمن"], a: "مصر والسودان" }
  ]
};

const CAT_NAMES = {
  general: '🌍 معلومات عامة',
  sports: '⚽ رياضة',
  history: '📜 تاريخ',
  science: '🔬 علوم',
  arab: '🗺️ الوطن العربي'
};

// ==================== متغيرات اللعبة ====================
let db;
let firebaseReady = false;
let myName = '';
let myRole = ''; // 'host' or 'guest'
let roomCode = '';
let roomListener = null;
let currentQuestionListener = null;
let roundResultListener = null;
let chatListener = null;
let timerInterval = null;
let isGameActive = false;

let currentQuestion = null;
let currentRound = 0;
let totalRounds = 6; // عدد الجولات
let scores = { p1: 0, p2: 0 };
let playerNames = { p1: '', p2: '' };
let questionsList = [];
let answered = false;
let doubleActive = false;
let skipUsed = false, doubleUsed = false, hintUsed = false;
let waitingForNext = false;

// ==================== تهيئة Firebase ====================
function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    firebaseReady = true;
    console.log('✅ Firebase connected');
  } catch(e) {
    console.error('Firebase error:', e);
    firebaseReady = false;
    alert('فشل الاتصال بقاعدة البيانات');
  }
}
initFirebase();

// ==================== مساعدات ====================
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${screenId}`).classList.add('active');
}

function showNotification(msg, type = 'info') {
  const existing = document.querySelector('.notif');
  if(existing) existing.remove();
  
  const div = document.createElement('div');
  div.className = `notif ${type}`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 6; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

function shuffleArray(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ==================== إنشاء غرفة ====================
async function createRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) {
    showNotification('أدخل اسمك أولاً', 'error');
    return;
  }
  if(!firebaseReady) {
    showNotification('قاعدة البيانات غير متصلة', 'error');
    return;
  }
  
  roomCode = generateCode();
  myRole = 'host';
  const category = document.getElementById('category').value;
  
  // تجهيز الأسئلة
  let qs = [...(QUESTIONS[category] || QUESTIONS.general)];
  qs = shuffleArray(qs).slice(0, totalRounds);
  questionsList = [...qs];
  
  const roomData = {
    host: myName,
    guest: null,
    category: category,
    status: 'waiting',
    scores: { p1: 0, p2: 0 },
    currentRound: 0,
    totalRounds: totalRounds,
    questions: qs,
    createdAt: Date.now()
  };
  
  try {
    await db.ref(`rooms/${roomCode}`).set(roomData);
    playerNames.p1 = myName;
    showLobby();
    listenToRoom();
  } catch(e) {
    showNotification('خطأ: ' + e.message, 'error');
  }
}

// ==================== انضمام للغرفة ====================
async function joinRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) {
    showNotification('أدخل اسمك أولاً', 'error');
    return;
  }
  
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!code || code.length !== 6) {
    showNotification('كود الغرفة غير صحيح', 'error');
    return;
  }
  
  if(!firebaseReady) {
    showNotification('قاعدة البيانات غير متصلة', 'error');
    return;
  }
  
  try {
    const snapshot = await db.ref(`rooms/${code}`).once('value');
    const roomData = snapshot.val();
    
    if(!roomData) {
      showNotification('الغرفة غير موجودة', 'error');
      return;
    }
    if(roomData.guest) {
      showNotification('الغرفة ممتلئة', 'error');
      return;
    }
    if(roomData.status !== 'waiting') {
      showNotification('اللعبة بدأت بالفعل', 'error');
      return;
    }
    
    roomCode = code;
    myRole = 'guest';
    playerNames.p1 = roomData.host;
    playerNames.p2 = myName;
    totalRounds = roomData.totalRounds || 6;
    questionsList = [...(roomData.questions || [])];
    
    await db.ref(`rooms/${roomCode}`).update({
      guest: myName,
      status: 'ready'
    });
    
    showLobby();
    listenToRoom();
  } catch(e) {
    showNotification('خطأ: ' + e.message, 'error');
  }
}

// ==================== شاشة الانتظار ====================
function showLobby() {
  showScreen('lobby');
  document.getElementById('room-code-display').textContent = roomCode;
  
  if(myRole === 'host') {
    document.getElementById('p1-name').textContent = myName;
    document.getElementById('p1-dot').className = 'status-dot dot-ready';
  } else {
    document.getElementById('p1-name').textContent = playerNames.p1;
    document.getElementById('p2-name').textContent = myName;
    document.getElementById('p2-dot').className = 'status-dot dot-ready';
    document.getElementById('lobby-waiting').innerHTML = '<div class="text-center" style="color:#9090b0;padding:20px">✅ جاهز! في انتظار المضيف...</div>';
  }
}

function listenToRoom() {
  if(roomListener) roomListener.off();
  
  roomListener = db.ref(`rooms/${roomCode}`);
  roomListener.on('value', (snapshot) => {
    const room = snapshot.val();
    if(!room) return;
    
    // لاعب ثاني انضم (للمضيف)
    if(myRole === 'host' && room.guest && !playerNames.p2) {
      playerNames.p2 = room.guest;
      document.getElementById('p2-name').textContent = room.guest;
      document.getElementById('p2-dot').className = 'status-dot dot-ready';
      document.getElementById('lobby-waiting').classList.add('hidden');
      document.getElementById('lobby-start').classList.remove('hidden');
      showNotification(`${room.guest} انضم!`, 'success');
    }
    
    // بدء اللعبة
    if(room.status === 'playing' && !isGameActive) {
      scores = room.scores || { p1: 0, p2: 0 };
      playerNames.p1 = room.host;
      playerNames.p2 = room.guest;
      startGameUI();
    }
    
    // انتهاء اللعبة
    if(room.status === 'finished') {
      if(isGameActive) showResultScreen(room.scores);
    }
  });
}

// ==================== بدء اللعبة ====================
async function startGame() {
  await db.ref(`rooms/${roomCode}`).update({
    status: 'playing',
    currentRound: 0,
    scores: { p1: 0, p2: 0 }
  });
}

function startGameUI() {
  isGameActive = true;
  showScreen('game');
  
  currentRound = 0;
  scores = { p1: 0, p2: 0 };
  answered = false;
  doubleActive = false;
  skipUsed = false;
  doubleUsed = false;
  hintUsed = false;
  waitingForNext = false;
  
  document.getElementById('name-p1').textContent = playerNames.p1 || 'اللاعب 1';
  document.getElementById('name-p2').textContent = playerNames.p2 || 'اللاعب 2';
  document.getElementById('score-p1').textContent = '0';
  document.getElementById('score-p2').textContent = '0';
  document.getElementById('round-num').textContent = `0/${totalRounds}`;
  
  document.getElementById('skip-btn').disabled = false;
  document.getElementById('double-btn').disabled = false;
  document.getElementById('hint-btn').disabled = false;
  
  // تنظيف المستمعين السابقين
  if(currentQuestionListener) currentQuestionListener.off();
  if(roundResultListener) roundResultListener.off();
  
  // استماع للسؤال الجديد
  currentQuestionListener = db.ref(`rooms/${roomCode}/currentQuestion`);
  currentQuestionListener.on('value', (snapshot) => {
    const data = snapshot.val();
    if(data && data.round !== currentRound && !waitingForNext) {
      currentQuestion = data.question;
      currentRound = data.round;
      answered = false;
      doubleActive = false;
      document.getElementById('round-num').textContent = `${currentRound}/${totalRounds}`;
      displayQuestion();
      startTimer(25);
    }
  });
  
  // استماع للنتائج
  roundResultListener = db.ref(`rooms/${roomCode}/roundResult`);
  roundResultListener.on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) {
      scores = data.scores;
      updateScoresUI();
      highlightAnswer(data.correctAnswer);
      
      if(data.gameOver) {
        setTimeout(() => showResultScreen(data.scores), 2000);
      } else {
        waitingForNext = true;
        setTimeout(() => {
          waitingForNext = false;
          if(myRole === 'host') nextQuestion();
        }, 2000);
      }
    }
  });
  
  listenToChat();
  
  // المضيف يبدأ السؤال الأول
  if(myRole === 'host') {
    setTimeout(() => nextQuestion(), 500);
  }
}

// ==================== الأسئلة ====================
async function nextQuestion() {
  if(!questionsList.length) {
    await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
    return;
  }
  
  currentRound++;
  const question = questionsList.shift();
  
  await db.ref(`rooms/${roomCode}/currentQuestion`).set({
    question: question,
    round: currentRound,
    startTime: Date.now()
  });
}

function displayQuestion() {
  if(!currentQuestion) return;
  
  const category = document.getElementById('category')?.value || 'general';
  document.getElementById('q-cat').textContent = CAT_NAMES[category] || 'معلومات عامة';
  document.getElementById('q-text').textContent = currentQuestion.q;
  
  // تحديد دور من يجيب
  const isHostTurn = (currentRound % 2 === 1);
  const isMyTurn = (myRole === 'host' && isHostTurn) || (myRole === 'guest' && !isHostTurn);
  
  document.getElementById('player1-card').classList.toggle('active', myRole === 'host' && isMyTurn);
  document.getElementById('player2-card').classList.toggle('active', myRole === 'guest' && isMyTurn);
  
  const container = document.getElementById('choices-container');
  container.innerHTML = '';
  
  currentQuestion.c.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => submitAnswer(choice);
    if(!isMyTurn || answered) btn.disabled = true;
    container.appendChild(btn);
  });
}

function submitAnswer(answer) {
  if(answered) return;
  answered = true;
  if(timerInterval) clearInterval(timerInterval);
  
  const isCorrect = (answer === currentQuestion.a);
  const points = isCorrect ? (doubleActive ? 20 : 10) : 0;
  
  if(myRole === 'host') {
    scores.p1 += points;
  } else {
    scores.p2 += points;
  }
  
  // تعطيل الأزرار
  document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
  
  showNotification(isCorrect ? `✅ صحيح! +${points}` : '❌ خطأ', isCorrect ? 'success' : 'error');
  
  const gameOver = (currentRound >= totalRounds || questionsList.length === 0);
  
  db.ref(`rooms/${roomCode}/roundResult`).set({
    scores: scores,
    correctAnswer: currentQuestion.a,
    pointsEarned: points,
    gameOver: gameOver,
    timestamp: Date.now()
  });
  
  if(gameOver) {
    db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
  }
}

function highlightAnswer(correctAnswer) {
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(btn => {
    if(btn.textContent === correctAnswer) {
      btn.classList.add('correct');
    } else if(btn.textContent !== correctAnswer) {
      btn.classList.add('wrong');
    }
    btn.disabled = true;
  });
}

function startTimer(seconds) {
  if(timerInterval) clearInterval(timerInterval);
  
  let timeLeft = seconds;
  const fill = document.getElementById('timer-fill');
  const text = document.getElementById('timer-text');
  
  fill.style.width = '100%';
  fill.classList.remove('warning', 'danger');
  text.textContent = `${seconds} ثانية`;
  
  timerInterval = setInterval(() => {
    timeLeft--;
    const percent = (timeLeft / seconds) * 100;
    fill.style.width = `${Math.max(0, percent)}%`;
    text.textContent = `${timeLeft} ثانية`;
    
    if(timeLeft <= 8) {
      fill.classList.add('danger');
    } else if(timeLeft <= 15) {
      fill.classList.add('warning');
    }
    
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      if(!answered) {
        answered = true;
        showNotification('⏰ انتهى الوقت!', 'error');
        document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
        
        const gameOver = (currentRound >= totalRounds || questionsList.length === 0);
        db.ref(`rooms/${roomCode}/roundResult`).set({
          scores: scores,
          correctAnswer: currentQuestion?.a || '',
          pointsEarned: 0,
          gameOver: gameOver,
          timestamp: Date.now()
        });
      }
    }
  }, 1000);
}

function updateScoresUI() {
  document.getElementById('score-p1').textContent = scores.p1;
  document.getElementById('score-p2').textContent = scores.p2;
  
  const s1 = document.getElementById('score-p1');
  const s2 = document.getElementById('score-p2');
  s1.className = `player-score ${scores.p1 >= scores.p2 ? 'green' : 'red'}`;
  s2.className = `player-score ${scores.p2 >= scores.p1 ? 'green' : 'red'}`;
}

// ==================== القدرات ====================
async function useSkip() {
  if(skipUsed || answered || myRole !== 'host') return;
  skipUsed = true;
  document.getElementById('skip-btn').disabled = true;
  if(timerInterval) clearInterval(timerInterval);
  showNotification('⏭ تم تخطي السؤال', 'info');
  await nextQuestion();
}

async function useDouble() {
  if(doubleUsed || answered) return;
  doubleUsed = true;
  doubleActive = true;
  document.getElementById('double-btn').disabled = true;
  showNotification('⚡ النقاط مضاعفة!', 'info');
}

async function useHint() {
  if(hintUsed || answered) return;
  hintUsed = true;
  document.getElementById('hint-btn').disabled = true;
  
  const buttons = document.querySelectorAll('.choice-btn');
  const wrongButtons = Array.from(buttons).filter(btn => btn.textContent !== currentQuestion?.a);
  const toRemove = wrongButtons.slice(0, Math.floor(wrongButtons.length / 2));
  toRemove.forEach(btn => {
    btn.style.opacity = '0.3';
    btn.disabled = true;
  });
  showNotification('💡 تم حذف إجابتين', 'info');
}

// ==================== الشات ====================
function listenToChat() {
  if(chatListener) chatListener.off();
  chatListener = db.ref(`rooms/${roomCode}/chat`);
  
  chatListener.on('child_added', (snapshot) => {
    const msg = snapshot.val();
    if(msg && msg.sender !== myName) {
      addChatMessage(msg.text, 'them', msg.sender);
    } else if(msg && msg.sender === myName) {
      addChatMessage(msg.text, 'me', msg.sender);
    }
  });
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  
  input.value = '';
  await db.ref(`rooms/${roomCode}/chat`).push({
    sender: myName,
    text: text,
    timestamp: Date.now()
  });
}

async function sendReaction(emoji) {
  await db.ref(`rooms/${roomCode}/chat`).push({
    sender: myName,
    text: emoji,
    timestamp: Date.now(),
    isReaction: true
  });
}

function addChatMessage(text, type, sender) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-message ${type}`;
  div.textContent = type === 'me' ? text : `${sender}: ${text}`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ==================== النتيجة ====================
function showResultScreen(finalScores) {
  isGameActive = false;
  if(timerInterval) clearInterval(timerInterval);
  
  const myScore = myRole === 'host' ? finalScores.p1 : finalScores.p2;
  const theirScore = myRole === 'host' ? finalScores.p2 : finalScores.p1;
  const isWin = myScore > theirScore;
  const isTie = myScore === theirScore;
  
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-overlay';
  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${isTie ? '🤝' : (isWin ? '🏆' : '😢')}</div>
      <div class="result-title">${isTie ? 'تعادل!' : (isWin ? 'أنت الفائز!' : 'خسرت')}</div>
      <div class="result-sub">${isTie ? 'لعبة رائعة!' : (isWin ? `${myScore} نقطة` : `${theirScore} نقطة`)}</div>
      <div class="final-scores">
        <div class="final-score-item">
          <div class="final-score-name">${playerNames.p1}</div>
          <div class="final-score-value ${finalScores.p1 >= finalScores.p2 ? 'winner' : ''}">${finalScores.p1}</div>
        </div>
        <div class="final-score-item">
          <div class="final-score-name">${playerNames.p2}</div>
          <div class="final-score-value ${finalScores.p2 >= finalScores.p1 ? 'winner' : ''}">${finalScores.p2}</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="location.reload()">🔄 العب مجدداً</button>
      <button class="btn btn-secondary" onclick="goHome()">🏠 الرئيسية</button>
    </div>
  `;
  
  document.body.appendChild(resultDiv);
}

function goHome() {
  // تنظيف المستمعين
  if(roomListener) roomListener.off();
  if(currentQuestionListener) currentQuestionListener.off();
  if(roundResultListener) roundResultListener.off();
  if(chatListener) chatListener.off();
  if(timerInterval) clearInterval(timerInterval);
  
  // حذف الغرفة
  if(roomCode && db) {
    db.ref(`rooms/${roomCode}`).remove().catch(e => console.log(e));
  }
  
  document.querySelector('.result-overlay')?.remove();
  isGameActive = false;
  roomCode = '';
  showScreen('home');
  document.getElementById('join-code').value = '';
}

async function leaveRoom() {
  if(roomCode && db) {
    await db.ref(`rooms/${roomCode}`).remove().catch(e => console.log(e));
  }
  goHome();
}

function copyCode() {
  navigator.clipboard.writeText(roomCode);
  showNotification('✅ تم نسخ الكود', 'success');
}
</script>

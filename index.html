<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>تحدي الكتاب المقدس - سباق الإجابات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0a0a0f;
  color: #f0f0ff;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  padding: 12px;
  min-height: 100vh;
}

.screen {
  display: none;
  max-width: 500px;
  margin: 0 auto;
}

.screen.active {
  display: block;
}

.card {
  background: #13131a;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

h1 {
  font-size: 28px;
  text-align: center;
  background: linear-gradient(135deg, #7c6fff, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #9090b0;
  font-size: 13px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  background: #1c1c27;
  border: 1px solid #2a2a35;
  border-radius: 12px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  margin: 8px 0;
  text-align: right;
}

input:focus {
  outline: none;
  border-color: #7c6fff;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin: 8px 0;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, #7c6fff, #5b4fd4);
  color: white;
}

.btn-secondary {
  background: #1c1c27;
  color: white;
  border: 1px solid #2a2a35;
}

.btn-danger {
  background: #ef4565;
  color: white;
}

.room-code {
  font-size: 32px;
  font-weight: 900;
  text-align: center;
  background: #1c1c27;
  padding: 20px;
  border-radius: 16px;
  letter-spacing: 8px;
  font-family: monospace;
  margin: 15px 0;
  direction: ltr;
  border: 2px dashed rgba(255,209,102,0.3);
  color: #ffd166;
}

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 15px 0;
  color: #9090b0;
  font-size: 12px;
}

.divider hr {
  flex: 1;
  height: 1px;
  background: #2a2a35;
  border: none;
}

.scoreboard {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 15px;
}

.player-card {
  background: #1c1c27;
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  flex: 1;
  border: 1.5px solid #2a2a35;
  transition: all 0.3s;
}

.player-card.answered {
  border-color: #06d6a0;
  background: rgba(6,214,160,0.1);
}

.player-name {
  font-size: 12px;
  color: #9090b0;
  margin-bottom: 5px;
}

.player-score {
  font-size: 28px;
  font-weight: 900;
}

.player-score.green {
  color: #06d6a0;
}

.round-info {
  text-align: center;
  background: #1c1c27;
  border-radius: 16px;
  padding: 12px;
  min-width: 80px;
}

.round-label {
  font-size: 10px;
  color: #9090b0;
}

.round-number {
  font-size: 20px;
  font-weight: 900;
}

.timer-container {
  margin: 15px 0;
}

.timer-bar {
  height: 8px;
  background: #1c1c27;
  border-radius: 10px;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  width: 100%;
  background: #06d6a0;
  border-radius: 10px;
  transition: width 1s linear;
}

.timer-fill.warning {
  background: #ffd166;
}

.timer-fill.danger {
  background: #ef4565;
}

.timer-text {
  text-align: center;
  font-size: 14px;
  margin-top: 5px;
  color: #9090b0;
}

.q-card {
  background: #1c1c27;
  border-radius: 16px;
  padding: 20px;
  margin: 15px 0;
  min-height: 200px;
}

.q-category {
  color: #7c6fff;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 5px;
  text-align: center;
}

.q-text {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.5;
  margin: 15px 0;
  text-align: center;
}

.choice-btn {
  width: 100%;
  padding: 14px;
  background: #13131a;
  border: 1.5px solid #2a2a35;
  border-radius: 12px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  margin: 6px 0;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.choice-btn:active {
  transform: scale(0.98);
}

.choice-btn.correct-highlight {
  background: rgba(6,214,160,0.2);
  border-color: #06d6a0;
}

.choice-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.powerups {
  display: flex;
  gap: 8px;
  margin: 10px 0;
}

.powerup-btn {
  flex: 1;
  padding: 10px;
  background: #1c1c27;
  border: 1px solid #2a2a35;
  border-radius: 12px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.powerup-btn:disabled {
  opacity: 0.3;
}

.chat-container {
  background: #1c1c27;
  border-radius: 16px;
  overflow: hidden;
  margin-top: 10px;
}

.chat-messages {
  height: 100px;
  overflow-y: auto;
  padding: 10px;
}

.chat-message {
  font-size: 12px;
  padding: 6px 10px;
  margin: 4px 0;
  border-radius: 10px;
  max-width: 85%;
  word-break: break-word;
}

.chat-message.me {
  background: rgba(124,111,255,0.2);
  color: #7c6fff;
  align-self: flex-start;
}

.chat-message.them {
  background: #13131a;
  color: #9090b0;
  align-self: flex-end;
  text-align: left;
}

.reactions {
  display: flex;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid #2a2a35;
  justify-content: center;
}

.react-emoji {
  font-size: 20px;
  background: #13131a;
  border: none;
  padding: 6px 10px;
  border-radius: 30px;
  cursor: pointer;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid #2a2a35;
}

.chat-input-row input {
  flex: 1;
  margin: 0;
  padding: 10px;
  font-size: 13px;
}

.chat-input-row button {
  padding: 10px 16px;
  background: #7c6fff;
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 700;
}

.result-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.result-card {
  background: #13131a;
  border-radius: 24px;
  padding: 30px;
  text-align: center;
  width: 90%;
  max-width: 320px;
  border: 1px solid rgba(255,255,255,0.1);
}

.result-emoji {
  font-size: 60px;
  margin-bottom: 10px;
}

.result-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 8px;
}

.result-sub {
  color: #9090b0;
  margin-bottom: 20px;
}

.final-scores {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 20px;
}

.final-score-value {
  font-size: 32px;
  font-weight: 900;
}

.final-score-value.winner {
  color: #ffd166;
}

.notif {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c27;
  border: 1px solid #2a2a35;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  z-index: 100;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}

.notif.success {
  border-color: #06d6a0;
  color: #06d6a0;
}

.notif.error {
  border-color: #ef4565;
  color: #ef4565;
}

.notif.info {
  border-color: #7c6fff;
  color: #7c6fff;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin: 0 auto 5px;
}

.dot-waiting {
  background: #ffd166;
  animation: pulse 1s infinite;
}

.dot-ready {
  background: #06d6a0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.hidden {
  display: none;
}

.text-center {
  text-align: center;
}

.bible-icon {
  font-size: 40px;
  text-align: center;
  margin-bottom: 10px;
}

.answer-status {
  font-size: 11px;
  margin-top: 5px;
  color: #ffd166;
}
</style>
</head>
<body>

<!-- الشاشة الرئيسية -->
<div id="screen-home" class="screen active">
  <div class="card">
    <div class="bible-icon">📖✝️</div>
    <h1>تحدي الكتاب المقدس</h1>
    <div class="subtitle">سباق الإجابات - الأسرع يفوز</div>
    
    <input type="text" id="player-name" placeholder="اسمك" maxlength="15">
    
    <button class="btn btn-primary" onclick="createRoom()">🏠 إنشاء غرفة</button>
    
    <div class="divider"><hr><span>أو</span><hr></div>
    
    <input type="text" id="join-code" placeholder="كود الغرفة (6 أحرف)" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:4px;font-family:monospace">
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 انضم</button>
  </div>
</div>

<!-- شاشة الانتظار -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <div class="text-center">
      <div class="bible-icon">📖</div>
      <div style="color:#9090b0;font-size:12px">كود الغرفة</div>
      <div class="room-code" id="room-code-display">------</div>
      <button class="btn btn-secondary" onclick="copyCode()" style="margin-top:10px">📋 نسخ</button>
      <button class="btn btn-danger" onclick="leaveRoom()" style="margin-top:5px">❌ مغادرة</button>
    </div>
    
    <div class="scoreboard" style="margin-top:20px">
      <div class="player-card">
        <div id="p1-dot" class="status-dot dot-waiting"></div>
        <div class="player-name">اللاعب 1</div>
        <div id="p1-name" style="font-weight:700">—</div>
      </div>
      <div class="player-card">
        <div id="p2-dot" class="status-dot dot-waiting"></div>
        <div class="player-name">اللاعب 2</div>
        <div id="p2-name" style="font-weight:700">في الانتظار...</div>
      </div>
    </div>
    
    <div id="lobby-waiting">
      <div class="text-center" style="color:#9090b0;padding:20px">⏳ في انتظار المنافس...</div>
    </div>
    
    <div id="lobby-start" class="hidden">
      <button class="btn btn-primary" onclick="startGame()">🚀 ابدأ اللعبة</button>
    </div>
  </div>
</div>

<!-- شاشة اللعبة -->
<div id="screen-game" class="screen">
  <div class="card" style="padding:15px">
    <div class="scoreboard">
      <div class="player-card" id="player1-card">
        <div class="player-name" id="name-p1">اللاعب 1</div>
        <div class="player-score green" id="score-p1">0</div>
        <div id="p1-status" class="answer-status"></div>
      </div>
      <div class="round-info">
        <div class="round-label">الجولة</div>
        <div class="round-number" id="round-num">0/10</div>
      </div>
      <div class="player-card" id="player2-card">
        <div class="player-name" id="name-p2">اللاعب 2</div>
        <div class="player-score green" id="score-p2">0</div>
        <div id="p2-status" class="answer-status"></div>
      </div>
    </div>
    
    <div class="timer-container">
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
      </div>
      <div class="timer-text" id="timer-text">30 ثانية</div>
    </div>
    
    <div class="q-card">
      <div class="q-category">📖 الكتاب المقدس</div>
      <div class="q-text" id="q-text">...</div>
      <div id="choices-container"></div>
    </div>
    
    <div class="powerups">
      <button class="powerup-btn" id="hint-btn" onclick="useHint()">💡 50/50</button>
    </div>
    
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="reactions">
        <button class="react-emoji" onclick="sendReaction('🔥')">🔥</button>
        <button class="react-emoji" onclick="sendReaction('😂')">😂</button>
        <button class="react-emoji" onclick="sendReaction('👏')">👏</button>
        <button class="react-emoji" onclick="sendReaction('💀')">💀</button>
        <button class="react-emoji" onclick="sendReaction('🤔')">🤔</button>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="رسالة..." maxlength="60" onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()">إرسال</button>
      </div>
    </div>
    
    <button class="btn btn-danger" onclick="leaveGame()" style="margin-top:10px">🚪 مغادرة</button>
  </div>
</div>

<script>
// ==================== Firebase Config ====================
const firebaseConfig = {
  apiKey: "AIzaSyAZkQmg9k3RXoaCU3E2tP-jHcXIYwNpLJA",
  authDomain: "bero-a2b6b.firebaseapp.com",
  databaseURL: "https://bero-a2b6b-default-rtdb.firebaseio.com",
  projectId: "bero-a2b6b",
  storageBucket: "bero-a2b6b.firebasestorage.app",
  messagingSenderId: "959500982230",
  appId: "1:959500982230:web:0e292eec3297e363e77677"
};

// ==================== الأسئلة ====================
const BIBLE_QUESTIONS = [
  { q: "كم عدد أسفار العهد القديم (البروتستانتي)؟", c: ["36", "39", "42", "45"], a: "39" },
  { q: "من هو أول إنسان خُلق؟", c: ["نوح", "إبراهيم", "آدم", "موسى"], a: "آدم" },
  { q: "في أي نهر تعمّد يسوع؟", c: ["الفرات", "النيل", "الأردن", "دجلة"], a: "الأردن" },
  { q: "كم يوماً صام يسوع في البرية؟", c: ["20", "30", "40", "50"], a: "40" },
  { q: "من كتب معظم رسائل العهد الجديد؟", c: ["يوحنا", "بطرس", "بولس", "لوقا"], a: "بولس" },
  { q: "أين وُلد يسوع؟", c: ["الناصرة", "أورشليم", "بيت لحم", "بيت عنيا"], a: "بيت لحم" },
  { q: "كم عدد تلاميذ يسوع؟", c: ["10", "11", "12", "13"], a: "12" },
  { q: "من بنى السفينة؟", c: ["إبراهيم", "موسى", "داود", "نوح"], a: "نوح" },
  { q: "أول معجزة ليسوع؟", c: ["إقامة لعازر", "إطعام 5000", "تحويل الماء لخمر", "شفاء أعمى"], a: "تحويل الماء لخمر" },
  { q: "قصة داود وجليات في أي سفر؟", c: ["التكوين", "المزامير", "صموئيل أول", "الملوك أول"], a: "صموئيل أول" },
  { q: "من هو الملك الذي بنى الهيكل؟", c: ["شاؤول", "داود", "سليمان", "حزقيا"], a: "سليمان" },
  { q: "كم سنة جال بنو إسرائيل في البرية؟", c: ["20", "40", "60", "80"], a: "40" },
  { q: "من الذي أكلته الحوت الكبير؟", c: ["إيليا", "صموئيل", "يونان", "إرميا"], a: "يونان" }
];

function shuffleArray(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ==================== المتغيرات العامة ====================
let db;
let myName = '';
let myRole = ''; // 'host' or 'guest'
let roomCode = '';
let roomListener = null;
let gameListener = null;
let chatListener = null;
let timerInterval = null;

let currentQuestionObj = null;
let currentRound = 0;
let totalRounds = 10;
let scores = { p1: 0, p2: 0 };
let playerNames = { p1: '', p2: '' };
let questionsRemaining = [];
let hasAnswered = false;
let hintUsed = false;
let waitingForNext = false;
let isGameActive = false;

// ==================== التهيئة ====================
function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    console.log('✅ Firebase connected');
  } catch(e) {
    console.error('Firebase error:', e);
    alert('فشل الاتصال بقاعدة البيانات');
  }
}
initFirebase();

function showNotification(msg, type = 'info') {
  const existing = document.querySelector('.notif');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className = `notif ${type}`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${screenId}`).classList.add('active');
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ==================== إنشاء غرفة ====================
async function createRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك', 'error'); return; }
  
  roomCode = generateCode();
  myRole = 'host';
  
  const shuffledQuestions = shuffleArray([...BIBLE_QUESTIONS]);
  questionsRemaining = shuffledQuestions.slice(0, totalRounds);
  
  const roomData = {
    host: myName,
    guest: null,
    status: 'waiting',
    scores: { p1: 0, p2: 0 },
    currentRound: 0,
    totalRounds: totalRounds,
    questions: questionsRemaining,
    createdAt: Date.now()
  };
  
  try {
    await db.ref(`rooms/${roomCode}`).set(roomData);
    playerNames.p1 = myName;
    showLobby();
    listenToRoom();
    showNotification(`✅ تم إنشاء الغرفة! الكود: ${roomCode}`, 'success');
  } catch(e) { showNotification('خطأ: ' + e.message, 'error'); }
}

// ==================== انضمام ====================
async function joinRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك', 'error'); return; }
  
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!code || code.length !== 6) { showNotification('كود غير صحيح', 'error'); return; }
  
  try {
    const snapshot = await db.ref(`rooms/${code}`).once('value');
    const roomData = snapshot.val();
    
    if(!roomData) { showNotification('غرفة غير موجودة', 'error'); return; }
    if(roomData.guest) { showNotification('الغرفة ممتلئة', 'error'); return; }
    if(roomData.status !== 'waiting') { showNotification('اللعبة بدأت بالفعل', 'error'); return; }
    
    roomCode = code;
    myRole = 'guest';
    playerNames.p1 = roomData.host;
    playerNames.p2 = myName;
    totalRounds = roomData.totalRounds || 10;
    questionsRemaining = [...(roomData.questions || [])];
    
    await db.ref(`rooms/${roomCode}`).update({ guest: myName });
    
    showLobby();
    listenToRoom();
    showNotification('✅ انضممت إلى الغرفة!', 'success');
  } catch(e) { showNotification('خطأ: ' + e.message, 'error'); }
}

// ==================== اللوبي ====================
function showLobby() {
  showScreen('lobby');
  document.getElementById('room-code-display').textContent = roomCode;
  
  if(myRole === 'host') {
    document.getElementById('p1-name').textContent = myName;
    document.getElementById('p1-dot').className = 'status-dot dot-ready';
    document.getElementById('lobby-waiting').innerHTML = '<div class="text-center" style="color:#ffd166;padding:20px">⏳ في انتظار انضمام صديق...</div>';
  } else {
    document.getElementById('p1-name').textContent = playerNames.p1;
    document.getElementById('p2-name').textContent = myName;
    document.getElementById('p2-dot').className = 'status-dot dot-ready';
    document.getElementById('lobby-waiting').innerHTML = '<div class="text-center" style="color:#06d6a0;padding:20px">✅ جاهز! في انتظار بدء المضيف...</div>';
  }
}

function listenToRoom() {
  if(roomListener) roomListener.off();
  
  roomListener = db.ref(`rooms/${roomCode}`);
  roomListener.on('value', (snapshot) => {
    const room = snapshot.val();
    if(!room) { showNotification('تم حذف الغرفة', 'error'); goHome(); return; }
    
    // تحديث إذا انضم الضيف (للمضيف)
    if(myRole === 'host' && room.guest && !playerNames.p2) {
      playerNames.p2 = room.guest;
      document.getElementById('p2-name').textContent = room.guest;
      document.getElementById('p2-dot').className = 'status-dot dot-ready';
      document.getElementById('lobby-waiting').classList.add('hidden');
      document.getElementById('lobby-start').classList.remove('hidden');
      showNotification(`${room.guest} انضم إلى الغرفة!`, 'success');
    }
    
    // بدء اللعبة
    if(room.status === 'playing' && !isGameActive) {
      scores = room.scores || { p1: 0, p2: 0 };
      playerNames.p1 = room.host;
      playerNames.p2 = room.guest;
      if(room.questions && room.questions.length > 0) {
        questionsRemaining = [...room.questions];
      }
      startGameUI();
    }
    
    // انتهاء اللعبة
    if(room.status === 'finished' && isGameActive) {
      showResultScreen(room.scores);
    }
  });
}

// ==================== بدء اللعبة ====================
async function startGame() {
  scores = { p1: 0, p2: 0 };
  currentRound = 0;
  
  await db.ref(`rooms/${roomCode}`).update({
    status: 'playing',
    currentRound: 0,
    scores: { p1: 0, p2: 0 }
  });
  
  // إرسال أول سؤال بعد تأخير بسيط
  setTimeout(() => {
    sendNextQuestion();
  }, 1000);
}

async function sendNextQuestion() {
  if(!questionsRemaining.length) {
    await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
    return;
  }
  
  currentRound++;
  const question = questionsRemaining.shift();
  
  const questionData = {
    q: question.q,
    c: question.c,
    a: question.a,
    round: currentRound,
    startTime: Date.now()
  };
  
  await db.ref(`rooms/${roomCode}`).update({
    currentQuestion: questionData,
    roundActive: true,
    roundResult: null,
    [`answersGiven`]: { p1: false, p2: false }
  });
  
  // تحديث قائمة الأسئلة المتبقية في قاعدة البيانات
  await db.ref(`rooms/${roomCode}/questions`).set(questionsRemaining);
}

// ==================== واجهة اللعبة ====================
function startGameUI() {
  isGameActive = true;
  showScreen('game');
  
  hasAnswered = false;
  hintUsed = false;
  waitingForNext = false;
  
  document.getElementById('name-p1').textContent = playerNames.p1;
  document.getElementById('name-p2').textContent = playerNames.p2;
  document.getElementById('score-p1').textContent = scores.p1;
  document.getElementById('score-p2').textContent = scores.p2;
  document.getElementById('round-num').textContent = `0/${totalRounds}`;
  document.getElementById('q-text').innerHTML = '⏳ جاري تحميل السؤال الأول...';
  document.getElementById('choices-container').innerHTML = '';
  document.getElementById('p1-status').innerHTML = '';
  document.getElementById('p2-status').innerHTML = '';
  document.getElementById('hint-btn').disabled = false;
  
  // مستمع تغييرات الغرفة
  if(gameListener) gameListener.off();
  gameListener = db.ref(`rooms/${roomCode}`);
  gameListener.on('value', async (snapshot) => {
    const room = snapshot.val();
    if(!room) return;
    
    // تحديث النتائج
    if(room.scores) {
      scores = room.scores;
      document.getElementById('score-p1').textContent = scores.p1;
      document.getElementById('score-p2').textContent = scores.p2;
    }
    
    // سؤال جديد
    const qData = room.currentQuestion;
    if(qData && qData.round !== currentRound && !waitingForNext && room.roundActive !== false) {
      loadNewQuestion(qData, room.answersGiven || { p1: false, p2: false });
    }
    
    // نتيجة الجولة
    if(room.roundResult && room.roundResult.round === currentRound && !waitingForNext) {
      handleRoundResult(room.roundResult);
    }
    
    // تحديث حالة الإجابات
    if(room.answersGiven) {
      updateAnswersStatus(room.answersGiven);
    }
  });
  
  listenToChat();
}

function loadNewQuestion(qData, answersGiven) {
  currentQuestionObj = qData;
  currentRound = qData.round;
  hasAnswered = answersGiven[myRole === 'host' ? 'p1' : 'p2'] || false;
  hintUsed = false;
  
  document.getElementById('round-num').textContent = `${currentRound}/${totalRounds}`;
  document.getElementById('q-text').innerHTML = qData.q;
  document.getElementById('hint-btn').disabled = hasAnswered;
  
  // بناء أزرار الإجابات
  const container = document.getElementById('choices-container');
  container.innerHTML = '';
  
  if(hasAnswered) {
    container.innerHTML = '<div class="text-center" style="padding:20px;color:#06d6a0">✓ تمت الإجابة على هذا السؤال</div>';
  } else {
    qData.c.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => submitAnswer(choice);
      container.appendChild(btn);
    });
  }
  
  updateAnswersStatus(answersGiven);
  startTimer(30);
}

function updateAnswersStatus(answersGiven) {
  if(myRole === 'host') {
    document.getElementById('p1-status').innerHTML = answersGiven.p1 ? '✓ أجبت' : '⏳ لم تجب بعد';
    document.getElementById('p2-status').innerHTML = answersGiven.p2 ? '✓ أجاب الخصم' : '⏳ الخصم لم يجب';
    document.getElementById('player1-card').classList.toggle('answered', answersGiven.p1);
    document.getElementById('player2-card').classList.toggle('answered', answersGiven.p2);
  } else {
    document.getElementById('p1-status').innerHTML = answersGiven.p1 ? '✓ أجاب الخصم' : '⏳ الخصم لم يجب';
    document.getElementById('p2-status').innerHTML = answersGiven.p2 ? '✓ أجبت' : '⏳ لم تجب بعد';
    document.getElementById('player1-card').classList.toggle('answered', answersGiven.p1);
    document.getElementById('player2-card').classList.toggle('answered', answersGiven.p2);
  }
}

async function submitAnswer(answer) {
  if(hasAnswered) return;
  
  const roomSnap = await db.ref(`rooms/${roomCode}`).once('value');
  const room = roomSnap.val();
  const qData = room.currentQuestion;
  
  if(!qData || qData.round !== currentRound) return;
  if(room.answersGiven && room.answersGiven[myRole === 'host' ? 'p1' : 'p2']) return;
  
  hasAnswered = true;
  if(timerInterval) clearInterval(timerInterval);
  
  const isCorrect = (answer === qData.a);
  const pointsEarned = isCorrect ? 10 : 0;
  const answerKey = myRole === 'host' ? 'p1' : 'p2';
  
  // تحديث النتيجة المحلية
  if(myRole === 'host') scores.p1 += pointsEarned;
  else scores.p2 += pointsEarned;
  
  // تحديث قاعدة البيانات
  const newAnswersGiven = { ...(room.answersGiven || { p1: false, p2: false }) };
  newAnswersGiven[answerKey] = true;
  
  await db.ref(`rooms/${roomCode}`).update({
    [`answersGiven/${answerKey}`]: true,
    scores: scores
  });
  
  showNotification(isCorrect ? `✅ صحيح! +${pointsEarned} نقطة` : `❌ خطأ! الإجابة الصحيحة: ${qData.a}`, isCorrect ? 'success' : 'error');
  
  // تعطيل الأزرار
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => btn.disabled = true);
  document.getElementById('hint-btn').disabled = true;
  
  // التحقق مما إذا كان كلا اللاعبين قد أجابا
  const bothAnswered = newAnswersGiven.p1 && newAnswersGiven.p2;
  const isGameOver = (currentRound >= totalRounds || questionsRemaining.length === 0);
  
  if(bothAnswered || isGameOver) {
    // تسجيل نتيجة الجولة
    await db.ref(`rooms/${roomCode}/roundResult`).set({
      round: currentRound,
      correctAnswer: qData.a,
      p1Answered: newAnswersGiven.p1,
      p2Answered: newAnswersGiven.p2,
      p1Correct: newAnswersGiven.p1 && (myRole === 'host' ? isCorrect : false),
      p2Correct: newAnswersGiven.p2 && (myRole === 'guest' ? isCorrect : false),
      p1Earned: newAnswersGiven.p1 && (myRole === 'host' ? pointsEarned : 0),
      p2Earned: newAnswersGiven.p2 && (myRole === 'guest' ? pointsEarned : 0),
      timestamp: Date.now()
    });
    
    await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
    
    if(isGameOver) {
      await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
    }
  }
}

function handleRoundResult(result) {
  waitingForNext = true;
  
  // إظهار الإجابة الصحيحة
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    if(btn.textContent === result.correctAnswer) {
      btn.classList.add('correct-highlight');
    }
    btn.disabled = true;
  });
  
  // الانتقال للسؤال التالي
  setTimeout(() => {
    waitingForNext = false;
    if(myRole === 'host') {
      sendNextQuestion();
    }
  }, 2500);
}

function startTimer(seconds) {
  if(timerInterval) clearInterval(timerInterval);
  
  let timeLeft = seconds;
  const fill = document.getElementById('timer-fill');
  const text = document.getElementById('timer-text');
  
  fill.style.width = '100%';
  fill.classList.remove('warning', 'danger');
  text.textContent = `${seconds} ثانية`;
  
  timerInterval = setInterval(async () => {
    timeLeft--;
    const percent = (timeLeft / seconds) * 100;
    fill.style.width = `${Math.max(0, percent)}%`;
    text.textContent = `${timeLeft} ثانية`;
    
    if(timeLeft <= 8) fill.classList.add('danger');
    else if(timeLeft <= 15) fill.classList.add('warning');
    
    if(timeLeft <= 0 && !hasAnswered && isGameActive) {
      clearInterval(timerInterval);
      
      const roomSnap = await db.ref(`rooms/${roomCode}`).once('value');
      const room = roomSnap.val();
      const qData = room.currentQuestion;
      const answersGiven = room.answersGiven || { p1: false, p2: false };
      const myKey = myRole === 'host' ? 'p1' : 'p2';
      
      if(qData && qData.round === currentRound && !answersGiven[myKey]) {
        hasAnswered = true;
        
        const newAnswersGiven = { ...answersGiven };
        newAnswersGiven[myKey] = true;
        
        await db.ref(`rooms/${roomCode}`).update({
          [`answersGiven/${myKey}`]: true
        });
        
        showNotification('⏰ انتهى الوقت! 0 نقطة', 'error');
        
        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(btn => btn.disabled = true);
        document.getElementById('hint-btn').disabled = true;
        
        const bothAnswered = newAnswersGiven.p1 && newAnswersGiven.p2;
        const isGameOver = (currentRound >= totalRounds || questionsRemaining.length === 0);
        
        if(bothAnswered || isGameOver) {
          await db.ref(`rooms/${roomCode}/roundResult`).set({
            round: currentRound,
            correctAnswer: qData.a,
            p1Answered: newAnswersGiven.p1,
            p2Answered: newAnswersGiven.p2,
            p1Correct: false,
            p2Correct: false,
            p1Earned: 0,
            p2Earned: 0,
            timestamp: Date.now()
          });
          
          await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
          
          if(isGameOver) {
            await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
          }
        }
      }
    }
  }, 1000);
}

// ==================== القدرات ====================
async function useHint() {
  if(hintUsed || hasAnswered) return;
  hintUsed = true;
  document.getElementById('hint-btn').disabled = true;
  
  const btns = document.querySelectorAll('.choice-btn');
  const correctAnswer = currentQuestionObj.a;
  const wrongBtns = Array.from(btns).filter(btn => btn.textContent !== correctAnswer);
  const toRemove = wrongBtns.slice(0, Math.floor(wrongBtns.length / 2));
  toRemove.forEach(btn => {
    btn.style.opacity = '0.3';
    btn.disabled = true;
  });
  showNotification('💡 تم حذف إجابتين خاطئتين', 'info');
}

// ==================== الشات ====================
function listenToChat() {
  if(chatListener) chatListener.off();
  chatListener = db.ref(`rooms/${roomCode}/chat`);
  chatListener.on('child_added', (snapshot) => {
    const msg = snapshot.val();
    if(msg) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-message ${msg.sender === myName ? 'me' : 'them'}`;
      div.textContent = msg.sender === myName ? msg.text : `${msg.sender}: ${msg.text}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  });
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: text, timestamp: Date.now() });
}

async function sendReaction(emoji) {
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: emoji, timestamp: Date.now() });
}

// ==================== الخروج والنتائج ====================
function showResultScreen(finalScores) {
  isGameActive = false;
  if(timerInterval) clearInterval(timerInterval);
  
  const myScore = myRole === 'host' ? finalScores.p1 : finalScores.p2;
  const theirScore = myRole === 'host' ? finalScores.p2 : finalScores.p1;
  const isWin = myScore > theirScore;
  const isTie = myScore === theirScore;
  
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-overlay';
  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${isTie ? '🤝' : (isWin ? '🏆' : '😢')}</div>
      <div class="result-title">${isTie ? 'تعادل!' : (isWin ? 'فزت!' : 'خسرت')}</div>
      <div class="result-sub">${isTie ? 'لعبة رائعة' : (isWin ? `${myScore} نقطة` : `${theirScore} نقطة`)}</div>
      <div class="final-scores">
        <div class="final-score-item">
          <div class="final-score-name">${playerNames.p1}</div>
          <div class="final-score-value ${finalScores.p1 >= finalScores.p2 ? 'winner' : ''}">${finalScores.p1}</div>
        </div>
        <div class="final-score-item">
          <div class="final-score-name">${playerNames.p2}</div>
          <div class="final-score-value ${finalScores.p2 >= finalScores.p1 ? 'winner' : ''}">${finalScores.p2}</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="location.reload()">🔄 لعب مرة أخرى</button>
      <button class="btn btn-secondary" onclick="goHome()">🏠 الرئيسية</button>
    </div>
  `;
  document.body.appendChild(resultDiv);
}

function leaveGame() { 
  if(confirm('هل تريد مغادرة اللعبة؟')) goHome(); 
}

function goHome() {
  if(roomListener) roomListener.off();
  if(gameListener) gameListener.off();
  if(chatListener) chatListener.off();
  if(timerInterval) clearInterval(timerInterval);
  if(roomCode && db) db.ref(`rooms/${roomCode}`).remove().catch(e=>console.log(e));
  document.querySelector('.result-overlay')?.remove();
  isGameActive = false;
  roomCode = '';
  showScreen('home');
  document.getElementById('join-code').value = '';
  document.getElementById('player-name').value = '';
}

async function leaveRoom() { 
  if(confirm('مغادرة الغرفة؟')) { 
    if(roomCode && db) await db.ref(`rooms/${roomCode}`).remove().catch(e=>console.log(e)); 
    goHome(); 
  } 
}

function copyCode() { 
  navigator.clipboard.writeText(roomCode); 
  showNotification('✅ تم نسخ الكود', 'success'); 
}
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>تحدي الكتاب المقدس - معركة المعرفة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0f0c1f 0%, #1a1535 50%, #0f0c1f 100%);
  min-height: 100vh;
  color: #fff;
  position: relative;
  overflow-x: hidden;
}

/* خلفية متحركة */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    radial-gradient(circle at 20% 80%, rgba(124, 111, 255, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255, 107, 157, 0.08) 0%, transparent 50%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
  pointer-events: none;
  animation: backgroundShift 20s ease infinite;
}

@keyframes backgroundShift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.05) rotate(1deg); }
}

/* نجوم متحركة */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

.screen {
  display: none;
  max-width: 550px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 2;
  min-height: 100vh;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* بطاقات متحركة */
.card {
  background: rgba(22, 20, 45, 0.85);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: 25px;
  margin-bottom: 15px;
  border: 1px solid rgba(124, 111, 255, 0.3);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(124, 111, 255, 0.1) inset;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(124, 111, 255, 0.3) inset;
}

/* هيدر مع تأثيرات */
.header-icon {
  text-align: center;
  margin-bottom: 15px;
  position: relative;
}

.header-icon .icon {
  font-size: 55px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(124, 111, 255, 0.5));
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 32px;
  text-align: center;
  background: linear-gradient(135deg, #7c6fff, #ff6b9d, #7c6fff);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 3s ease infinite;
  margin-bottom: 8px;
  font-weight: 900;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.subtitle {
  text-align: center;
  color: rgba(144, 144, 176, 0.9);
  font-size: 13px;
  margin-bottom: 20px;
}

/* حقول الإدخال */
.input-group {
  position: relative;
  margin: 15px 0;
}

input {
  width: 100%;
  padding: 16px 20px;
  background: rgba(28, 28, 39, 0.8);
  border: 1.5px solid rgba(124, 111, 255, 0.3);
  border-radius: 18px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  text-align: right;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  border-color: #7c6fff;
  box-shadow: 0 0 20px rgba(124, 111, 255, 0.3);
  transform: scale(1.02);
}

/* أزرار بتأثيرات رائعة */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin: 10px 0;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.btn:active::before {
  width: 300px;
  height: 300px;
}

.btn-primary {
  background: linear-gradient(135deg, #7c6fff, #5b4fd4);
  color: white;
  box-shadow: 0 5px 15px rgba(124, 111, 255, 0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(124, 111, 255, 0.5);
}

.btn-secondary {
  background: rgba(28, 28, 39, 0.9);
  color: white;
  border: 1.5px solid rgba(124, 111, 255, 0.5);
}

.btn-danger {
  background: linear-gradient(135deg, #ef4565, #c73552);
  color: white;
}

/* كود الغرفة */
.room-code-box {
  background: linear-gradient(135deg, rgba(28, 28, 39, 0.9), rgba(124, 111, 255, 0.1));
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  margin: 15px 0;
  border: 1px solid rgba(124, 111, 255, 0.3);
}

.room-code {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 10px;
  font-family: monospace;
  background: linear-gradient(135deg, #ffd166, #ff9d4a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  direction: ltr;
}

/* لوحة النتائج */
.scoreboard {
  display: flex;
  justify-content: space-between;
  gap: 15px;
  margin-bottom: 20px;
}

.player-card {
  background: rgba(28, 28, 39, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  flex: 1;
  border: 1.5px solid rgba(124, 111, 255, 0.2);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.player-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(124, 111, 255, 0.1), transparent);
  opacity: 0;
  transition: opacity 0.5s;
}

.player-card.active::before {
  opacity: 1;
  animation: pulse 2s infinite;
}

.player-card.answered {
  border-color: #06d6a0;
  box-shadow: 0 0 20px rgba(6, 214, 160, 0.3);
  animation: answerFlash 0.5s ease;
}

@keyframes answerFlash {
  0%, 100% { background: rgba(6, 214, 160, 0); }
  50% { background: rgba(6, 214, 160, 0.2); }
}

.player-name {
  font-size: 13px;
  color: #9090b0;
  margin-bottom: 8px;
}

.player-score {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff, #ffd166);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* مؤقت زمني بتأثير */
.timer-container {
  margin: 20px 0;
}

.timer-bar {
  height: 10px;
  background: rgba(28, 28, 39, 0.8);
  border-radius: 10px;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #06d6a0, #ffd166, #ef4565);
  border-radius: 10px;
  transition: width 1s linear;
  position: relative;
}

.timer-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 1s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.timer-text {
  text-align: center;
  font-size: 14px;
  margin-top: 8px;
  color: #ffd166;
  font-weight: 700;
}

/* بطاقة السؤال */
.q-card {
  background: rgba(28, 28, 39, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 24px;
  padding: 25px;
  margin: 20px 0;
  text-align: center;
  border: 1px solid rgba(124, 111, 255, 0.3);
  animation: cardGlow 3s ease infinite;
}

@keyframes cardGlow {
  0%, 100% { box-shadow: 0 5px 20px rgba(124, 111, 255, 0.1); }
  50% { box-shadow: 0 5px 30px rgba(124, 111, 255, 0.3); }
}

.q-category {
  color: #7c6fff;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.q-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.6;
  margin: 20px 0;
}

/* أزرار الاختيارات */
.choice-btn {
  width: 100%;
  padding: 15px;
  background: rgba(19, 19, 26, 0.8);
  border: 1.5px solid rgba(124, 111, 255, 0.3);
  border-radius: 16px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 600;
  margin: 8px 0;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
}

.choice-btn:hover:not(:disabled) {
  transform: translateX(-5px);
  border-color: #7c6fff;
  background: rgba(124, 111, 255, 0.1);
}

.choice-btn:active:not(:disabled) {
  transform: scale(0.98);
}

.choice-btn.correct-highlight {
  background: rgba(6, 214, 160, 0.2);
  border-color: #06d6a0;
  animation: correctPulse 0.5s ease;
}

@keyframes correctPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(6, 214, 160, 0.5); }
}

.choice-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* قدرات */
.powerups {
  display: flex;
  gap: 12px;
  margin: 15px 0;
}

.powerup-btn {
  flex: 1;
  padding: 12px;
  background: linear-gradient(135deg, rgba(28, 28, 39, 0.9), rgba(124, 111, 255, 0.2));
  border: 1px solid rgba(124, 111, 255, 0.4);
  border-radius: 16px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.powerup-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(124, 111, 255, 0.3);
}

.powerup-btn:disabled {
  opacity: 0.3;
}

/* شات */
.chat-container {
  background: rgba(28, 28, 39, 0.6);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 15px;
}

.chat-messages {
  height: 100px;
  overflow-y: auto;
  padding: 12px;
}

.chat-message {
  font-size: 12px;
  padding: 6px 12px;
  margin: 4px 0;
  border-radius: 12px;
  max-width: 85%;
  word-break: break-word;
  animation: messageSlide 0.3s ease;
}

@keyframes messageSlide {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.chat-message.me {
  background: linear-gradient(135deg, rgba(124, 111, 255, 0.3), rgba(124, 111, 255, 0.1));
  color: #7c6fff;
  text-align: right;
}

.chat-message.them {
  background: rgba(19, 19, 26, 0.8);
  color: #9090b0;
  text-align: left;
}

.reactions {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-top: 1px solid rgba(124, 111, 255, 0.2);
  justify-content: center;
}

.react-emoji {
  font-size: 22px;
  background: rgba(19, 19, 26, 0.8);
  border: none;
  padding: 8px 12px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.react-emoji:hover {
  transform: scale(1.2);
  background: rgba(124, 111, 255, 0.3);
}

/* شاشة النتيجة */
.result-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.result-card {
  background: linear-gradient(135deg, rgba(28, 28, 39, 0.95), rgba(19, 19, 26, 0.95));
  border-radius: 32px;
  padding: 35px;
  text-align: center;
  width: 90%;
  max-width: 340px;
  border: 1px solid rgba(124, 111, 255, 0.5);
  animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes scaleIn {
  from {
    opacity: 0;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.result-emoji {
  font-size: 70px;
  margin-bottom: 15px;
  animation: bounce 0.6s ease;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.result-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ffd166, #ff9d4a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* إشعارات */
.notif {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(28, 28, 39, 0.95);
  backdrop-filter: blur(12px);
  border: 1px solid;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 1000;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
}

.notif.success { border-color: #06d6a0; color: #06d6a0; }
.notif.error { border-color: #ef4565; color: #ef4565; }
.notif.info { border-color: #7c6fff; color: #7c6fff; }

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin: 0 auto 8px;
}

.dot-waiting {
  background: #ffd166;
  animation: pulse 1s infinite;
}

.dot-ready {
  background: #06d6a0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.answer-status {
  font-size: 11px;
  margin-top: 8px;
  color: #ffd166;
}

.hidden { display: none; }
.text-center { text-align: center; }

/* شريط تقدم الجولة */
.round-info {
  text-align: center;
  background: rgba(28, 28, 39, 0.7);
  border-radius: 20px;
  padding: 12px;
  min-width: 80px;
}

.round-label {
  font-size: 11px;
  color: #9090b0;
}

.round-number {
  font-size: 22px;
  font-weight: 900;
  color: #7c6fff;
}

/* تأثيرات التحميل */
.loading-spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(124, 111, 255, 0.3);
  border-top-color: #7c6fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- الشاشة الرئيسية -->
<div id="screen-home" class="screen active">
  <div class="card">
    <div class="header-icon">
      <div class="icon">📖✝️</div>
    </div>
    <h1>تحدي الكتاب المقدس</h1>
    <div class="subtitle">سباق المعرفة - من الأسرع والأذكى؟</div>
    
    <div class="input-group">
      <input type="text" id="player-name" placeholder="اسمك" maxlength="15">
    </div>
    
    <button class="btn btn-primary" onclick="createRoom()">🏠 إنشاء غرفة جديدة</button>
    
    <div class="divider" style="display: flex; align-items: center; gap: 10px; margin: 15px 0; color: #9090b0;">
      <hr style="flex: 1; height: 1px; background: rgba(124,111,255,0.3); border: none;">
      <span>أو</span>
      <hr style="flex: 1; height: 1px; background: rgba(124,111,255,0.3); border: none;">
    </div>
    
    <div class="input-group">
      <input type="text" id="join-code" placeholder="كود الغرفة (6 أحرف)" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:4px;font-family:monospace">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 انضم إلى غرفة</button>
  </div>
</div>

<!-- شاشة الانتظار -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <div class="text-center">
      <div class="header-icon">
        <div class="icon">🎮</div>
      </div>
      <div style="color:#9090b0;font-size:12px">كود الغرفة</div>
      <div class="room-code-box">
        <div class="room-code" id="room-code-display">------</div>
      </div>
      <button class="btn btn-secondary" onclick="copyCode()" style="margin-top:5px">📋 نسخ الكود</button>
      <button class="btn btn-danger" onclick="leaveRoom()" style="margin-top:5px">❌ مغادرة</button>
    </div>
    
    <div class="scoreboard" style="margin-top:20px">
      <div class="player-card">
        <div id="p1-dot" class="status-dot dot-waiting"></div>
        <div class="player-name">اللاعب 1</div>
        <div id="p1-name" style="font-weight:700; font-size:18px">—</div>
      </div>
      <div class="player-card">
        <div id="p2-dot" class="status-dot dot-waiting"></div>
        <div class="player-name">اللاعب 2</div>
        <div id="p2-name" style="font-weight:700; font-size:18px">في الانتظار...</div>
      </div>
    </div>
    
    <div id="lobby-waiting">
      <div class="text-center" style="color:#9090b0;padding:30px">
        <div class="loading-spinner"></div>
        <div style="margin-top:10px">⏳ في انتظار المنافس...</div>
      </div>
    </div>
    
    <div id="lobby-start" class="hidden">
      <button class="btn btn-primary" onclick="startGame()">🚀 ابدأ اللعبة</button>
    </div>
  </div>
</div>

<!-- شاشة اللعبة -->
<div id="screen-game" class="screen">
  <div class="card" style="padding:18px">
    <div class="scoreboard">
      <div class="player-card" id="player1-card">
        <div class="player-name" id="name-p1">اللاعب 1</div>
        <div class="player-score" id="score-p1">0</div>
        <div id="p1-status" class="answer-status"></div>
      </div>
      <div class="round-info">
        <div class="round-label">الجولة</div>
        <div class="round-number" id="round-num">0/10</div>
      </div>
      <div class="player-card" id="player2-card">
        <div class="player-name" id="name-p2">اللاعب 2</div>
        <div class="player-score" id="score-p2">0</div>
        <div id="p2-status" class="answer-status"></div>
      </div>
    </div>
    
    <div class="timer-container">
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
      </div>
      <div class="timer-text" id="timer-text">⏱️ 30 ثانية</div>
    </div>
    
    <div class="q-card">
      <div class="q-category">📖 الكتاب المقدس</div>
      <div class="q-text" id="q-text">...</div>
      <div id="choices-container"></div>
    </div>
    
    <div class="powerups">
      <button class="powerup-btn" id="hint-btn" onclick="useHint()">💡 50/50</button>
    </div>
    
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="reactions">
        <button class="react-emoji" onclick="sendReaction('🔥')">🔥</button>
        <button class="react-emoji" onclick="sendReaction('😂')">😂</button>
        <button class="react-emoji" onclick="sendReaction('👏')">👏</button>
        <button class="react-emoji" onclick="sendReaction('💀')">💀</button>
        <button class="react-emoji" onclick="sendReaction('🤔')">🤔</button>
        <button class="react-emoji" onclick="sendReaction('🎉')">🎉</button>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="رسالة..." maxlength="60" onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()">إرسال</button>
      </div>
    </div>
    
    <button class="btn btn-danger" onclick="leaveGame()" style="margin-top:12px">🚪 مغادرة اللعبة</button>
  </div>
</div>

<script>
// ==================== Firebase ====================
const firebaseConfig = {
  apiKey: "AIzaSyAZkQmg9k3RXoaCU3E2tP-jHcXIYwNpLJA",
  authDomain: "bero-a2b6b.firebaseapp.com",
  databaseURL: "https://bero-a2b6b-default-rtdb.firebaseio.com",
  projectId: "bero-a2b6b",
  storageBucket: "bero-a2b6b.firebasestorage.app",
  messagingSenderId: "959500982230",
  appId: "1:959500982230:web:0e292eec3297e363e77677"
};

// ==================== الأسئلة ====================
const BIBLE_QUESTIONS = [
  { q: "كم عدد أسفار العهد القديم (البروتستانتي)؟", c: ["36", "39", "42", "45"], a: "39" },
  { q: "من هو أول إنسان خُلق؟", c: ["نوح", "إبراهيم", "آدم", "موسى"], a: "آدم" },
  { q: "في أي نهر تعمّد يسوع؟", c: ["الفرات", "النيل", "الأردن", "دجلة"], a: "الأردن" },
  { q: "كم يوماً صام يسوع في البرية؟", c: ["20", "30", "40", "50"], a: "40" },
  { q: "من كتب معظم رسائل العهد الجديد؟", c: ["يوحنا", "بطرس", "بولس", "لوقا"], a: "بولس" },
  { q: "أين وُلد يسوع؟", c: ["الناصرة", "أورشليم", "بيت لحم", "بيت عنيا"], a: "بيت لحم" },
  { q: "كم عدد تلاميذ يسوع؟", c: ["10", "11", "12", "13"], a: "12" },
  { q: "من بنى السفينة؟", c: ["إبراهيم", "موسى", "داود", "نوح"], a: "نوح" },
  { q: "أول معجزة ليسوع؟", c: ["إقامة لعازر", "إطعام 5000", "تحويل الماء لخمر", "شفاء أعمى"], a: "تحويل الماء لخمر" },
  { q: "قصة داود وجليات في أي سفر؟", c: ["التكوين", "المزامير", "صموئيل أول", "الملوك أول"], a: "صموئيل أول" },
  { q: "من هو الملك الذي بنى الهيكل؟", c: ["شاؤول", "داود", "سليمان", "حزقيا"], a: "سليمان" },
  { q: "كم سنة جال بنو إسرائيل في البرية؟", c: ["20", "40", "60", "80"], a: "40" },
  { q: "من الذي أكلته الحوت الكبير؟", c: ["إيليا", "صموئيل", "يونان", "إرميا"], a: "يونان" },
  { q: "ما هي معجزة يسوع الأولى؟", c: ["شفاء أعمى", "إقامة ميت", "تحويل الماء لخمر", "المشي على الماء"], a: "تحويل الماء لخمر" },
  { q: "من هو تلميذ يسوع الذي خانه؟", c: ["بطرس", "يوحنا", "يهوذا", "متى"], a: "يهوذا" }
];

function shuffleArray(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ==================== المتغيرات ====================
let db;
let myName = '';
let myRole = '';
let roomCode = '';
let roomListener = null;
let chatListener = null;
let timerInterval = null;

let currentQuestionObj = null;
let currentRound = 0;
let totalRounds = 10;
let scores = { p1: 0, p2: 0 };
let playerNames = { p1: '', p2: '' };
let questionsRemaining = [];
let hasAnswered = false;
let hintUsed = false;
let waitingForNext = false;
let isGameActive = false;
let timeLeft = 30;

// ==================== التهيئة ====================
function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    console.log('✅ Firebase connected');
  } catch(e) {
    console.error('Firebase error:', e);
    alert('فشل الاتصال بقاعدة البيانات');
  }
}
initFirebase();

// إنشاء نجوم متحركة
function createStars() {
  const starsContainer = document.getElementById('stars');
  for(let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random() * 3 + 'px';
    star.style.height = star.style.width;
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = 2 + Math.random() * 2 + 's';
    starsContainer.appendChild(star);
  }
}
createStars();

function showNotification(msg, type = 'info') {
  const existing = document.querySelector('.notif');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className = `notif ${type}`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${screenId}`).classList.add('active');
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ==================== إنشاء غرفة ====================
async function createRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك أولاً', 'error'); return; }
  
  roomCode = generateCode();
  myRole = 'host';
  
  const shuffledQuestions = shuffleArray([...BIBLE_QUESTIONS]);
  questionsRemaining = shuffledQuestions.slice(0, totalRounds);
  
  const roomData = {
    host: myName,
    guest: null,
    status: 'waiting',
    scores: { p1: 0, p2: 0 },
    currentRound: 0,
    totalRounds: totalRounds,
    questions: questionsRemaining,
    createdAt: Date.now(),
    answersGiven: { p1: false, p2: false },
    roundActive: false
  };
  
  try {
    await db.ref(`rooms/${roomCode}`).set(roomData);
    playerNames.p1 = myName;
    showLobby();
    listenToRoom();
    showNotification(`✅ تم إنشاء الغرفة! الكود: ${roomCode}`, 'success');
  } catch(e) { showNotification('خطأ: ' + e.message, 'error'); }
}

// ==================== انضمام ====================
async function joinRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك أولاً', 'error'); return; }
  
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!code || code.length !== 6) { showNotification('كود غير صحيح', 'error'); return; }
  
  try {
    const snapshot = await db.ref(`rooms/${code}`).once('value');
    const roomData = snapshot.val();
    
    if(!roomData) { showNotification('غرفة غير موجودة', 'error'); return; }
    if(roomData.guest) { showNotification('الغرفة ممتلئة', 'error'); return; }
    if(roomData.status !== 'waiting') { showNotification('اللعبة بدأت بالفعل', 'error'); return; }
    
    roomCode = code;
    myRole = 'guest';
    playerNames.p1 = roomData.host;
    playerNames.p2 = myName;
    totalRounds = roomData.totalRounds || 10;
    questionsRemaining = [...(roomData.questions || [])];
    
    await db.ref(`rooms/${roomCode}`).update({ guest: myName });
    
    showLobby();
    listenToRoom();
    showNotification('✅ انضممت إلى الغرفة!', 'success');
  } catch(e) { showNotification('خطأ: ' + e.message, 'error'); }
}

// ==================== اللوبي ====================
function showLobby() {
  showScreen('lobby');
  document.getElementById('room-code-display').textContent = roomCode;
  
  if(myRole === 'host') {
    document.getElementById('p1-name').textContent = myName;
    document.getElementById('p1-dot').className = 'status-dot dot-ready';
  } else {
    document.getElementById('p1-name').textContent = playerNames.p1;
    document.getElementById('p2-name').textContent = myName;
    document.getElementById('p2-dot').className = 'status-dot dot-ready';
  }
}

function listenToRoom() {
  if(roomListener) roomListener.off();
  
  roomListener = db.ref(`rooms/${roomCode}`);
  roomListener.on('value', (snapshot) => {
    const room = snapshot.val();
    if(!room) { showNotification('تم حذف الغرفة', 'error'); goHome(); return; }
    
    // تحديث عند انضمام الضيف
    if(myRole === 'host' && room.guest && !playerNames.p2) {
      playerNames.p2 = room.guest;
      document.getElementById('p2-name').textContent = room.guest;
      document.getElementById('p2-dot').className = 'status-dot dot-ready';
      document.getElementById('lobby-waiting').classList.add('hidden');
      document.getElementById('lobby-start').classList.remove('hidden');
      showNotification(`🎉 ${room.guest} انضم إلى الغرفة!`, 'success');
    }
    
    // بدء اللعبة
    if(room.status === 'playing' && !isGameActive) {
      scores = room.scores || { p1: 0, p2: 0 };
      playerNames.p1 = room.host;
      playerNames.p2 = room.guest;
      if(room.questions && room.questions.length > 0) {
        questionsRemaining = [...room.questions];
      }
      startGameUI();
    }
    
    // انتهاء اللعبة
    if(room.status === 'finished' && isGameActive) {
      showResultScreen(room.scores);
    }
  });
}

// ==================== بدء اللعبة ====================
async function startGame() {
  scores = { p1: 0, p2: 0 };
  currentRound = 0;
  
  await db.ref(`rooms/${roomCode}`).update({
    status: 'playing',
    currentRound: 0,
    scores: { p1: 0, p2: 0 },
    answersGiven: { p1: false, p2: false },
    roundActive: false
  });
  
  setTimeout(() => {
    sendNextQuestion();
  }, 1500);
}

async function sendNextQuestion() {
  if(!questionsRemaining.length) {
    await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
    return;
  }
  
  currentRound++;
  const question = questionsRemaining.shift();
  
  const questionData = {
    q: question.q,
    c: question.c,
    a: question.a,
    round: currentRound,
    startTime: Date.now()
  };
  
  await db.ref(`rooms/${roomCode}`).update({
    currentQuestion: questionData,
    roundActive: true,
    roundResult: null,
    answersGiven: { p1: false, p2: false },
    questions: questionsRemaining
  });
}

// ==================== واجهة اللعبة ====================
function startGameUI() {
  isGameActive = true;
  showScreen('game');
  
  hasAnswered = false;
  hintUsed = false;
  waitingForNext = false;
  
  document.getElementById('name-p1').textContent = playerNames.p1;
  document.getElementById('name-p2').textContent = playerNames.p2;
  document.getElementById('score-p1').textContent = scores.p1;
  document.getElementById('score-p2').textContent = scores.p2;
  document.getElementById('round-num').textContent = `0/${totalRounds}`;
  document.getElementById('q-text').innerHTML = '<div class="loading-spinner" style="width:30px;height:30px"></div><div style="margin-top:10px">جاري تحميل السؤال...</div>';
  document.getElementById('choices-container').innerHTML = '';
  
  // مستمع التغييرات
  if(roomListener) roomListener.off();
  roomListener = db.ref(`rooms/${roomCode}`);
  roomListener.on('value', async (snapshot) => {
    const room = snapshot.val();
    if(!room) return;
    
    // تحديث النتائج
    if(room.scores) {
      scores = room.scores;
      document.getElementById('score-p1').textContent = scores.p1;
      document.getElementById('score-p2').textContent = scores.p2;
    }
    
    // سؤال جديد
    const qData = room.currentQuestion;
    if(qData && qData.round !== currentRound && !waitingForNext && room.roundActive === true) {
      loadNewQuestion(qData, room.answersGiven || { p1: false, p2: false });
    }
    
    // نتيجة الجولة
    if(room.roundResult && room.roundResult.round === currentRound && !waitingForNext && room.roundActive === false) {
      handleRoundResult(room.roundResult);
    }
    
    // تحديث حالة الإجابات
    if(room.answersGiven) {
      updateAnswersStatus(room.answersGiven);
    }
  });
  
  listenToChat();
}

function loadNewQuestion(qData, answersGiven) {
  currentQuestionObj = qData;
  currentRound = qData.round;
  hasAnswered = answersGiven[myRole === 'host' ? 'p1' : 'p2'] || false;
  hintUsed = false;
  timeLeft = 30;
  
  document.getElementById('round-num').textContent = `${currentRound}/${totalRounds}`;
  document.getElementById('q-text').innerHTML = qData.q;
  
  if(timerInterval) clearInterval(timerInterval);
  
  if(hasAnswered) {
    document.getElementById('choices-container').innerHTML = '<div class="text-center" style="padding:20px;color:#06d6a0;">✓ تمت الإجابة على هذا السؤال</div>';
    document.getElementById('hint-btn').disabled = true;
  } else {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    qData.c.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => submitAnswer(choice);
      container.appendChild(btn);
    });
    document.getElementById('hint-btn').disabled = false;
    startTimer(30);
  }
  
  updateAnswersStatus(answersGiven);
}

function updateAnswersStatus(answersGiven) {
  if(myRole === 'host') {
    document.getElementById('p1-status').innerHTML = answersGiven.p1 ? '✓ أجبت ✓' : '⏳ لم تجب بعد';
    document.getElementById('p2-status').innerHTML = answersGiven.p2 ? '✓ أجاب الخصم ✓' : '⏳ في انتظار الخصم';
    document.getElementById('player1-card').classList.toggle('answered', answersGiven.p1);
    document.getElementById('player2-card').classList.toggle('answered', answersGiven.p2);
  } else {
    document.getElementById('p1-status').innerHTML = answersGiven.p1 ? '✓ أجاب الخصم ✓' : '⏳ في انتظار الخصم';
    document.getElementById('p2-status').innerHTML = answersGiven.p2 ? '✓ أجبت ✓' : '⏳ لم تجب بعد';
    document.getElementById('player1-card').classList.toggle('answered', answersGiven.p1);
    document.getElementById('player2-card').classList.toggle('answered', answersGiven.p2);
  }
}

function startTimer(seconds) {
  if(timerInterval) clearInterval(timerInterval);
  
  let timeLeft = seconds;
  const fill = document.getElementById('timer-fill');
  const text = document.getElementById('timer-text');
  
  fill.style.width = '100%';
  text.textContent = `⏱️ ${timeLeft} ثانية`;
  
  timerInterval = setInterval(async () => {
    timeLeft--;
    const percent = (timeLeft / seconds) * 100;
    fill.style.width = `${Math.max(0, percent)}%`;
    text.textContent = `⏱️ ${timeLeft} ثانية`;
    
    if(timeLeft <= 5) fill.style.background = '#ef4565';
    else if(timeLeft <= 10) fill.style.background = '#ffd166';
    
    if(timeLeft <= 0 && !hasAnswered && isGameActive && currentQuestionObj) {
      clearInterval(timerInterval);
      
      const roomSnap = await db.ref(`rooms/${roomCode}`).once('value');
      const room = roomSnap.val();
      const qData = room.currentQuestion;
      const answersGiven = room.answersGiven || { p1: false, p2: false };
      const myKey = myRole === 'host' ? 'p1' : 'p2';
      
      if(qData && qData.round === currentRound && !answersGiven[myKey]) {
        hasAnswered = true;
        
        const newAnswersGiven = { ...answersGiven };
        newAnswersGiven[myKey] = true;
        
        await db.ref(`rooms/${roomCode}`).update({
          [`answersGiven/${myKey}`]: true
        });
        
        showNotification('⏰ انتهى الوقت! 0 نقطة', 'error');
        
        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(btn => btn.disabled = true);
        document.getElementById('hint-btn').disabled = true;
        
        const bothAnswered = newAnswersGiven.p1 && newAnswersGiven.p2;
        const isGameOver = (currentRound >= totalRounds || questionsRemaining.length === 0);
        
        if(bothAnswered || isGameOver) {
          await db.ref(`rooms/${roomCode}/roundResult`).set({
            round: currentRound,
            correctAnswer: qData.a,
            p1Answered: newAnswersGiven.p1,
            p2Answered: newAnswersGiven.p2,
            p1Correct: false,
            p2Correct: false,
            p1Earned: 0,
            p2Earned: 0,
            timestamp: Date.now()
          });
          
          await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
          
          if(isGameOver) {
            await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
          }
        }
      }
    }
  }, 1000);
}

async function submitAnswer(answer) {
  if(hasAnswered) return;
  
  const roomSnap = await db.ref(`rooms/${roomCode}`).once('value');
  const room = roomSnap.val();
  const qData = room.currentQuestion;
  
  if(!qData || qData.round !== currentRound) return;
  if(room.answersGiven && room.answersGiven[myRole === 'host' ? 'p1' : 'p2']) return;
  
  hasAnswered = true;
  if(timerInterval) clearInterval(timerInterval);
  
  const isCorrect = (answer === qData.a);
  const pointsEarned = isCorrect ? 10 : 0;
  const answerKey = myRole === 'host' ? 'p1' : 'p2';
  
  if(myRole === 'host') scores.p1 += pointsEarned;
  else scores.p2 += pointsEarned;
  
  const newAnswersGiven = { ...(room.answersGiven || { p1: false, p2: false }) };
  newAnswersGiven[answerKey] = true;
  
  await db.ref(`rooms/${roomCode}`).update({
    [`answersGiven/${answerKey}`]: true,
    scores: scores
  });
  
  showNotification(isCorrect ? `✅ صحيح! +${pointsEarned} نقطة` : `❌ خطأ! الإجابة الصحيحة: ${qData.a}`, isCorrect ? 'success' : 'error');
  
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => btn.disabled = true);
  document.getElementById('hint-btn').disabled = true;
  
  const bothAnswered = newAnswersGiven.p1 && newAnswersGiven.p2;
  const isGameOver = (currentRound >= totalRounds || questionsRemaining.length === 0);
  
  if(bothAnswered || isGameOver) {
    await db.ref(`rooms/${roomCode}/roundResult`).set({
      round: currentRound,
      correctAnswer: qData.a,
      p1Answered: newAnswersGiven.p1,
      p2Answered: newAnswersGiven.p2,
      p1Correct: newAnswersGiven.p1 && (myRole === 'host' ? isCorrect : false),
      p2Correct: newAnswersGiven.p2 && (myRole === 'guest' ? isCorrect : false),
      p1Earned: newAnswersGiven.p1 && (myRole === 'host' ? pointsEarned : 0),
      p2Earned: newAnswersGiven.p2 && (myRole === 'guest' ? pointsEarned : 0),
      timestamp: Date.now()
    });
    
    await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
    
    if(isGameOver) {
      await db.ref(`rooms/${roomCode}`).update({ status: 'finished', scores: scores });
    }
  }
}

function handleRoundResult(result) {
  waitingForNext = true;
  
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    if(btn.textContent === result.correctAnswer) {
      btn.classList.add('correct-highlight');
    }
    btn.disabled = true;
  });
  
  setTimeout(() => {
    waitingForNext = false;
    if(myRole === 'host') {
      sendNextQuestion();
    }
  }, 2500);
}

// ==================== القدرات ====================
async function useHint() {
  if(hintUsed || hasAnswered || !currentQuestionObj) return;
  hintUsed = true;
  document.getElementById('hint-btn').disabled = true;
  
  const btns = document.querySelectorAll('.choice-btn');
  const correctAnswer = currentQuestionObj.a;
  const wrongBtns = Array.from(btns).filter(btn => btn.textContent !== correctAnswer);
  const toRemove = wrongBtns.slice(0, Math.floor(wrongBtns.length / 2));
  toRemove.forEach(btn => {
    btn.style.opacity = '0.3';
    btn.disabled = true;
  });
  showNotification('💡 تم حذف إجابتين خاطئتين', 'info');
}

// ==================== الشات ====================
function listenToChat() {
  if(chatListener) chatListener.off();
  chatListener = db.ref(`rooms/${roomCode}/chat`);
  chatListener.on('child_added', (snapshot) => {
    const msg = snapshot.val();
    if(msg) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-message ${msg.sender === myName ? 'me' : 'them'}`;
      div.textContent = msg.sender === myName ? msg.text : `${msg.sender}: ${msg.text}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  });
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: text, timestamp: Date.now() });
}

async function sendReaction(emoji) {
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: emoji, timestamp: Date.now() });
}

// ==================== الخروج والنتائج ====================
function showResultScreen(finalScores) {
  isGameActive = false;
  if(timerInterval) clearInterval(timerInterval);
  
  const myScore = myRole === 'host' ? finalScores.p1 : finalScores.p2;
  const theirScore = myRole === 'host' ? finalScores.p2 : finalScores.p1;
  const isWin = myScore > theirScore;
  const isTie = myScore === theirScore;
  
  let emoji, title, message;
  if(isTie) {
    emoji = '🤝';
    title = 'تعادل!';
    message = 'لعبة رائعة من الطرفين';
  } else if(isWin) {
    emoji = '🏆';
    title = 'فزت!';
    message = `مبروك! سجلت ${myScore} نقطة`;
  } else {
    emoji = '😢';
    title = 'خسرت';
    message = `سجلت ${myScore} نقطة، في المرة القادمة إن شاء الله`;
  }
  
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-overlay';
  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${title}</div>
      <div class="result-sub">${message}</div>
      <div style="display: flex; justify-content: space-between; gap: 20px; margin: 20px 0;">
        <div style="text-align: center;">
          <div style="font-size: 12px; color: #9090b0;">${playerNames.p1}</div>
          <div style="font-size: 36px; font-weight: 900; ${finalScores.p1 >= finalScores.p2 ? 'color: #ffd166;' : 'color: #fff;'}">${finalScores.p1}</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 12px; color: #9090b0;">${playerNames.p2}</div>
          <div style="font-size: 36px; font-weight: 900; ${finalScores.p2 >= finalScores.p1 ? 'color: #ffd166;' : 'color: #fff;'}">${finalScores.p2}</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="location.reload()">🔄 لعب مرة أخرى</button>
      <button class="btn btn-secondary" onclick="goHome()">🏠 الرئيسية</button>
    </div>
  `;
  document.body.appendChild(resultDiv);
}

function leaveGame() { 
  if(confirm('هل تريد مغادرة اللعبة؟')) goHome(); 
}

function goHome() {
  if(roomListener) roomListener.off();
  if(chatListener) chatListener.off();
  if(timerInterval) clearInterval(timerInterval);
  if(roomCode && db) db.ref(`rooms/${roomCode}`).remove().catch(e=>console.log(e));
  document.querySelector('.result-overlay')?.remove();
  isGameActive = false;
  roomCode = '';
  currentRound = 0;
  showScreen('home');
  document.getElementById('join-code').value = '';
  document.getElementById('player-name').value = '';
}

async function leaveRoom() { 
  if(confirm('مغادرة الغرفة؟')) { 
    if(roomCode && db) await db.ref(`rooms/${roomCode}`).remove().catch(e=>console.log(e)); 
    goHome(); 
  } 
}

function copyCode() { 
  navigator.clipboard.writeText(roomCode); 
  showNotification('✅ تم نسخ الكود', 'success'); 
}
</script>
</body>
</html>

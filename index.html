<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>تحدي الكتاب المقدس - معركة المعرفة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0f0c1f 0%, #1a1535 50%, #0f0c1f 100%);
  min-height: 100vh;
  color: #fff;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: radial-gradient(circle at 20% 80%, rgba(124,111,255,0.08) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(255,107,157,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

.screen {
  display: none;
  max-width: 550px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 2;
  min-height: 100vh;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  animation: fadeInUp 0.5s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(22, 20, 45, 0.85);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: 25px;
  margin-bottom: 15px;
  border: 1px solid rgba(124,111,255,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.header-icon {
  text-align: center;
  margin-bottom: 15px;
}

.header-icon .icon {
  font-size: 55px;
  display: inline-block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 32px;
  text-align: center;
  background: linear-gradient(135deg, #7c6fff, #ff6b9d, #7c6fff);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.subtitle {
  text-align: center;
  color: rgba(144,144,176,0.9);
  font-size: 13px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 16px 20px;
  background: rgba(28,28,39,0.8);
  border: 1.5px solid rgba(124,111,255,0.3);
  border-radius: 18px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  text-align: right;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  border-color: #7c6fff;
  box-shadow: 0 0 20px rgba(124,111,255,0.3);
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin: 10px 0;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-primary {
  background: linear-gradient(135deg, #7c6fff, #5b4fd4);
  color: white;
  box-shadow: 0 5px 15px rgba(124,111,255,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(124,111,255,0.5);
}

.btn-secondary {
  background: rgba(28,28,39,0.9);
  color: white;
  border: 1.5px solid rgba(124,111,255,0.5);
}

.btn-danger {
  background: linear-gradient(135deg, #ef4565, #c73552);
  color: white;
}

.room-code {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 10px;
  font-family: monospace;
  background: linear-gradient(135deg, #ffd166, #ff9d4a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  direction: ltr;
  text-align: center;
  padding: 15px;
}

.scoreboard {
  display: flex;
  justify-content: space-between;
  gap: 15px;
  margin-bottom: 20px;
}

.player-card {
  background: rgba(28,28,39,0.7);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  flex: 1;
  border: 1.5px solid rgba(124,111,255,0.2);
  transition: all 0.3s ease;
}

.player-card.answered {
  border-color: #06d6a0;
  box-shadow: 0 0 20px rgba(6,214,160,0.3);
  animation: answerFlash 0.5s ease;
}

@keyframes answerFlash {
  0%, 100% { background: rgba(6,214,160,0); }
  50% { background: rgba(6,214,160,0.2); }
}

.player-name {
  font-size: 13px;
  color: #9090b0;
  margin-bottom: 8px;
}

.player-score {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff, #ffd166);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.timer-container {
  margin: 20px 0;
}

.timer-bar {
  height: 10px;
  background: rgba(28,28,39,0.8);
  border-radius: 10px;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #06d6a0, #ffd166, #ef4565);
  border-radius: 10px;
  transition: width 1s linear;
}

.timer-text {
  text-align: center;
  font-size: 14px;
  margin-top: 8px;
  color: #ffd166;
  font-weight: 700;
}

.q-card {
  background: rgba(28,28,39,0.7);
  backdrop-filter: blur(8px);
  border-radius: 24px;
  padding: 25px;
  margin: 20px 0;
  text-align: center;
  border: 1px solid rgba(124,111,255,0.3);
}

.q-category {
  color: #7c6fff;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 10px;
}

.q-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.6;
  margin: 20px 0;
}

.choice-btn {
  width: 100%;
  padding: 15px;
  background: rgba(19,19,26,0.8);
  border: 1.5px solid rgba(124,111,255,0.3);
  border-radius: 16px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 600;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.3s ease;
}

.choice-btn:hover:not(:disabled) {
  transform: translateX(-5px);
  border-color: #7c6fff;
  background: rgba(124,111,255,0.1);
}

.choice-btn.correct-highlight {
  background: rgba(6,214,160,0.2);
  border-color: #06d6a0;
}

.choice-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.powerups {
  display: flex;
  gap: 12px;
  margin: 15px 0;
}

.powerup-btn {
  flex: 1;
  padding: 12px;
  background: linear-gradient(135deg, rgba(28,28,39,0.9), rgba(124,111,255,0.2));
  border: 1px solid rgba(124,111,255,0.4);
  border-radius: 16px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.powerup-btn:hover:not(:disabled) {
  transform: translateY(-2px);
}

.powerup-btn:disabled {
  opacity: 0.3;
}

.chat-container {
  background: rgba(28,28,39,0.6);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 15px;
}

.chat-messages {
  height: 100px;
  overflow-y: auto;
  padding: 12px;
}

.chat-message {
  font-size: 12px;
  padding: 6px 12px;
  margin: 4px 0;
  border-radius: 12px;
  max-width: 85%;
  word-break: break-word;
}

.chat-message.me {
  background: linear-gradient(135deg, rgba(124,111,255,0.3), rgba(124,111,255,0.1));
  color: #7c6fff;
  text-align: right;
}

.chat-message.them {
  background: rgba(19,19,26,0.8);
  color: #9090b0;
  text-align: left;
}

.reactions {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-top: 1px solid rgba(124,111,255,0.2);
  justify-content: center;
}

.react-emoji {
  font-size: 22px;
  background: rgba(19,19,26,0.8);
  border: none;
  padding: 8px 12px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.react-emoji:hover {
  transform: scale(1.2);
  background: rgba(124,111,255,0.3);
}

.notif {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(28,28,39,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  z-index: 1000;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.notif.success { border-color: #06d6a0; color: #06d6a0; }
.notif.error { border-color: #ef4565; color: #ef4565; }
.notif.info { border-color: #7c6fff; color: #7c6fff; }

.leave-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.leave-card {
  background: linear-gradient(135deg, rgba(28,28,39,0.95), rgba(19,19,26,0.95));
  border-radius: 32px;
  padding: 35px;
  text-align: center;
  width: 90%;
  max-width: 340px;
  border: 1px solid rgba(239,69,101,0.5);
}

.result-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.result-card {
  background: linear-gradient(135deg, rgba(28,28,39,0.95), rgba(19,19,26,0.95));
  border-radius: 32px;
  padding: 35px;
  text-align: center;
  width: 90%;
  max-width: 340px;
  border: 1px solid rgba(124,111,255,0.5);
}

.result-emoji {
  font-size: 60px;
  margin-bottom: 15px;
}

.result-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 10px;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin: 0 auto 8px;
}

.dot-waiting {
  background: #ffd166;
  animation: pulse 1s infinite;
}

.dot-ready {
  background: #06d6a0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.answer-status {
  font-size: 11px;
  margin-top: 8px;
  color: #ffd166;
}

.round-info {
  text-align: center;
  background: rgba(28,28,39,0.7);
  border-radius: 20px;
  padding: 12px;
  min-width: 80px;
}

.round-label {
  font-size: 11px;
  color: #9090b0;
}

.round-number {
  font-size: 22px;
  font-weight: 900;
  color: #7c6fff;
}

.loading-spinner {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid rgba(124,111,255,0.3);
  border-top-color: #7c6fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden { display: none; }
.text-center { text-align: center; }
.divider { display: flex; align-items: center; gap: 10px; margin: 15px 0; color: #9090b0; }
.divider hr { flex: 1; height: 1px; background: rgba(124,111,255,0.3); border: none; }
.chat-input-row { display: flex; gap: 8px; padding: 10px; border-top: 1px solid rgba(124,111,255,0.2); }
.chat-input-row input { flex: 1; margin: 0; padding: 10px; font-size: 13px; }
.chat-input-row button { padding: 10px 16px; background: #7c6fff; border: none; border-radius: 12px; color: white; font-weight: 700; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div id="screen-home" class="screen active">
  <div class="card">
    <div class="header-icon"><div class="icon">📖✝️</div></div>
    <h1>تحدي الكتاب المقدس</h1>
    <div class="subtitle">سباق المعرفة - الأسرع يفوز</div>
    <input type="text" id="player-name" placeholder="اسمك" maxlength="15">
    <button class="btn btn-primary" onclick="createRoom()">🏠 إنشاء غرفة</button>
    <div class="divider"><hr><span>أو</span><hr></div>
    <input type="text" id="join-code" placeholder="كود الغرفة" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:4px">
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 انضم</button>
  </div>
</div>

<div id="screen-lobby" class="screen">
  <div class="card">
    <div class="text-center">
      <div class="header-icon"><div class="icon">🎮</div></div>
      <div style="color:#9090b0">كود الغرفة</div>
      <div class="room-code" id="room-code-display">------</div>
      <button class="btn btn-secondary" onclick="copyCode()">📋 نسخ</button>
      <button class="btn btn-danger" onclick="leaveRoom()">❌ مغادرة</button>
    </div>
    <div class="scoreboard" style="margin-top:20px">
      <div class="player-card"><div id="p1-dot" class="status-dot dot-waiting"></div><div class="player-name">اللاعب 1</div><div id="p1-name" style="font-weight:700">—</div></div>
      <div class="player-card"><div id="p2-dot" class="status-dot dot-waiting"></div><div class="player-name">اللاعب 2</div><div id="p2-name" style="font-weight:700">في الانتظار...</div></div>
    </div>
    <div id="lobby-waiting"><div class="text-center" style="padding:30px"><div class="loading-spinner"></div><div style="margin-top:10px">⏳ في انتظار المنافس...</div></div></div>
    <div id="lobby-start" class="hidden"><button class="btn btn-primary" onclick="startGame()">🚀 ابدأ اللعبة</button></div>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="card" style="padding:18px">
    <div class="scoreboard">
      <div class="player-card" id="player1-card"><div class="player-name" id="name-p1">اللاعب 1</div><div class="player-score" id="score-p1">0</div><div id="p1-status" class="answer-status"></div></div>
      <div class="round-info"><div class="round-label">الجولة</div><div class="round-number" id="round-num">0/10</div></div>
      <div class="player-card" id="player2-card"><div class="player-name" id="name-p2">اللاعب 2</div><div class="player-score" id="score-p2">0</div><div id="p2-status" class="answer-status"></div></div>
    </div>
    <div class="timer-container"><div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div><div class="timer-text" id="timer-text">⏱️ 30 ثانية</div></div>
    <div class="q-card"><div class="q-category">📖 الكتاب المقدس</div><div class="q-text" id="q-text">...</div><div id="choices-container"></div></div>
    <div class="powerups"><button class="powerup-btn" id="hint-btn" onclick="useHint()">💡 50/50</button></div>
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="reactions">
        <button class="react-emoji" onclick="sendReaction('🔥')">🔥</button>
        <button class="react-emoji" onclick="sendReaction('😂')">😂</button>
        <button class="react-emoji" onclick="sendReaction('👏')">👏</button>
        <button class="react-emoji" onclick="sendReaction('💀')">💀</button>
        <button class="react-emoji" onclick="sendReaction('🎉')">🎉</button>
      </div>
      <div class="chat-input-row"><input type="text" id="chat-input" placeholder="رسالة..." onkeypress="if(event.key==='Enter') sendChat()"><button onclick="sendChat()">إرسال</button></div>
    </div>
    <button class="btn btn-danger" onclick="leaveGame()">🚪 مغادرة</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZkQmg9k3RXoaCU3E2tP-jHcXIYwNpLJA",
  authDomain: "bero-a2b6b.firebaseapp.com",
  databaseURL: "https://bero-a2b6b-default-rtdb.firebaseio.com",
  projectId: "bero-a2b6b",
  storageBucket: "bero-a2b6b.firebasestorage.app",
  messagingSenderId: "959500982230",
  appId: "1:959500982230:web:0e292eec3297e363e77677"
};

const QUESTIONS = [
  { q: "كم عدد أسفار العهد القديم (البروتستانتي)؟", c: ["36", "39", "42", "45"], a: "39" },
  { q: "من هو أول إنسان خُلق؟", c: ["نوح", "إبراهيم", "آدم", "موسى"], a: "آدم" },
  { q: "في أي نهر تعمّد يسوع؟", c: ["الفرات", "النيل", "الأردن", "دجلة"], a: "الأردن" },
  { q: "كم يوماً صام يسوع في البرية؟", c: ["20", "30", "40", "50"], a: "40" },
  { q: "من كتب معظم رسائل العهد الجديد؟", c: ["يوحنا", "بطرس", "بولس", "لوقا"], a: "بولس" },
  { q: "أين وُلد يسوع؟", c: ["الناصرة", "أورشليم", "بيت لحم", "بيت عنيا"], a: "بيت لحم" },
  { q: "كم عدد تلاميذ يسوع؟", c: ["10", "11", "12", "13"], a: "12" },
  { q: "من بنى السفينة؟", c: ["إبراهيم", "موسى", "داود", "نوح"], a: "نوح" },
  { q: "أول معجزة ليسوع؟", c: ["إقامة لعازر", "إطعام 5000", "تحويل الماء لخمر", "شفاء أعمى"], a: "تحويل الماء لخمر" },
  { q: "قصة داود وجليات في أي سفر؟", c: ["التكوين", "المزامير", "صموئيل أول", "الملوك أول"], a: "صموئيل أول" }
];

let db, myName = '', myRole = '', roomCode = '';
let roomRef = null, chatRef = null, timer = null;
let currentRound = 0, totalRounds = 10, myScore = 0, theirScore = 0;
let hasAnswered = false, hintUsed = false, waitingNext = false;
let questionsList = [], currentQuestion = null;
let player1Name = '', player2Name = '';

function shuffle(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showNotification(msg, type) {
  let div = document.createElement('div');
  div.className = `notif ${type}`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}

function generateCode() {
  let chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', code = '';
  for(let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function createStars() {
  let stars = document.getElementById('stars');
  for(let i = 0; i < 80; i++) {
    let s = document.createElement('div');
    s.className = 'star';
    s.style.width = Math.random() * 3 + 'px';
    s.style.height = s.style.width;
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    stars.appendChild(s);
  }
}
createStars();

try { firebase.initializeApp(firebaseConfig); db = firebase.database(); } catch(e) { console.log(e); }

async function createRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك', 'error'); return; }
  
  roomCode = generateCode();
  myRole = 'host';
  questionsList = shuffle([...QUESTIONS]).slice(0, totalRounds);
  
  await db.ref(`rooms/${roomCode}`).set({
    host: myName, guest: null, status: 'waiting',
    p1Score: 0, p2Score: 0, currentRound: 0,
    questions: questionsList, totalRounds: totalRounds,
    roundActive: false, answers: { p1: false, p2: false }
  });
  
  player1Name = myName;
  document.getElementById('room-code-display').innerHTML = roomCode;
  document.getElementById('p1-name').innerHTML = myName;
  document.getElementById('p1-dot').className = 'status-dot dot-ready';
  showScreen('lobby');
  listenToRoom();
  showNotification(`✅ الكود: ${roomCode}`, 'success');
}

async function joinRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك', 'error'); return; }
  
  let code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!code || code.length !== 6) { showNotification('كود غير صحيح', 'error'); return; }
  
  let snap = await db.ref(`rooms/${code}`).once('value');
  let room = snap.val();
  if(!room) { showNotification('غرفة غير موجودة', 'error'); return; }
  if(room.guest) { showNotification('الغرفة ممتلئة', 'error'); return; }
  if(room.status !== 'waiting') { showNotification('اللعبة بدأت', 'error'); return; }
  
  roomCode = code;
  myRole = 'guest';
  player1Name = room.host;
  player2Name = myName;
  totalRounds = room.totalRounds;
  questionsList = [...room.questions];
  
  await db.ref(`rooms/${roomCode}`).update({ guest: myName });
  showScreen('lobby');
  document.getElementById('room-code-display').innerHTML = roomCode;
  document.getElementById('p1-name').innerHTML = player1Name;
  document.getElementById('p2-name').innerHTML = myName;
  document.getElementById('p2-dot').className = 'status-dot dot-ready';
  listenToRoom();
  showNotification('✅ انضممت!', 'success');
}

function listenToRoom() {
  if(roomRef) roomRef.off();
  roomRef = db.ref(`rooms/${roomCode}`);
  roomRef.on('value', (snap) => {
    let room = snap.val();
    if(!room) { showOpponentLeft(); return; }
    
    // تحديث اللوبي
    if(room.status === 'waiting' || room.status === 'ready') {
      if(myRole === 'host' && room.guest && !player2Name) {
        player2Name = room.guest;
        document.getElementById('p2-name').innerHTML = room.guest;
        document.getElementById('p2-dot').className = 'status-dot dot-ready';
        document.getElementById('lobby-waiting').classList.add('hidden');
        document.getElementById('lobby-start').classList.remove('hidden');
        showNotification(`${room.guest} انضم!`, 'success');
      }
    }
    
    // بدء اللعبة
    if(room.status === 'playing' && !window.gameActive) {
      startGameUI(room);
    }
    
    // تحديث النتائج أثناء اللعب
    if(window.gameActive && room.p1Score !== undefined) {
      document.getElementById('score-p1').innerHTML = room.p1Score;
      document.getElementById('score-p2').innerHTML = room.p2Score;
    }
    
    // سؤال جديد
    if(room.roundActive === true && room.currentQuestion && room.currentQuestion.round !== currentRound && !waitingNext) {
      loadQuestion(room.currentQuestion, room.answers);
    }
    
    // نتيجة الجولة
    if(room.roundResult && room.roundResult.round === currentRound && !waitingNext) {
      showRoundResult(room.roundResult);
    }
  });
}

function startGameUI(room) {
  window.gameActive = true;
  showScreen('game');
  currentRound = 0;
  myScore = 0;
  theirScore = 0;
  hasAnswered = false;
  waitingNext = false;
  
  document.getElementById('name-p1').innerHTML = room.host;
  document.getElementById('name-p2').innerHTML = room.guest;
  document.getElementById('score-p1').innerHTML = room.p1Score;
  document.getElementById('score-p2').innerHTML = room.p2Score;
  document.getElementById('round-num').innerHTML = `0/${totalRounds}`;
  document.getElementById('q-text').innerHTML = '<div class="loading-spinner"></div><div style="margin-top:10px">جاري التحميل...</div>';
  
  listenToChat();
  
  // لو أنا المضيف وأول سؤال لسه ما نزلش
  if(myRole === 'host' && room.currentRound === 0) {
    setTimeout(() => sendNextQuestion(), 1000);
  }
}

async function sendNextQuestion() {
  if(!questionsList.length) {
    await db.ref(`rooms/${roomCode}`).update({ status: 'finished' });
    return;
  }
  
  currentRound++;
  let q = questionsList.shift();
  
  await db.ref(`rooms/${roomCode}`).update({
    currentQuestion: {
      q: q.q, c: q.c, a: q.a, round: currentRound
    },
    questions: questionsList,
    roundActive: true,
    answers: { p1: false, p2: false },
    roundResult: null
  });
}

function loadQuestion(qData, answers) {
  currentQuestion = qData;
  currentRound = qData.round;
  hasAnswered = answers[myRole === 'host' ? 'p1' : 'p2'] || false;
  hintUsed = false;
  
  document.getElementById('round-num').innerHTML = `${currentRound}/${totalRounds}`;
  document.getElementById('q-text').innerHTML = qData.q;
  document.getElementById('hint-btn').disabled = hasAnswered;
  
  if(timer) clearInterval(timer);
  
  if(hasAnswered) {
    document.getElementById('choices-container').innerHTML = '<div class="text-center" style="padding:20px;color:#06d6a0;">✓ تمت الإجابة</div>';
  } else {
    let container = document.getElementById('choices-container');
    container.innerHTML = '';
    qData.c.forEach(choice => {
      let btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = choice;
      btn.onclick = () => submitAnswer(choice);
      container.appendChild(btn);
    });
    startTimer(30);
  }
  
  updateAnswersUI(answers);
}

function updateAnswersUI(answers) {
  if(myRole === 'host') {
    document.getElementById('p1-status').innerHTML = answers.p1 ? '✓ أجبت' : '⏳ لم تجب';
    document.getElementById('p2-status').innerHTML = answers.p2 ? '✓ أجاب الخصم' : '⏳ ينتظر';
    document.getElementById('player1-card').classList.toggle('answered', answers.p1);
    document.getElementById('player2-card').classList.toggle('answered', answers.p2);
  } else {
    document.getElementById('p1-status').innerHTML = answers.p1 ? '✓ أجاب الخصم' : '⏳ ينتظر';
    document.getElementById('p2-status').innerHTML = answers.p2 ? '✓ أجبت' : '⏳ لم تجب';
    document.getElementById('player1-card').classList.toggle('answered', answers.p1);
    document.getElementById('player2-card').classList.toggle('answered', answers.p2);
  }
}

function startTimer(sec) {
  let timeLeft = sec;
  let fill = document.getElementById('timer-fill');
  let text = document.getElementById('timer-text');
  fill.style.width = '100%';
  text.innerHTML = `⏱️ ${timeLeft} ثانية`;
  
  timer = setInterval(() => {
    timeLeft--;
    let percent = (timeLeft / sec) * 100;
    fill.style.width = `${Math.max(0, percent)}%`;
    text.innerHTML = `⏱️ ${timeLeft} ثانية`;
    if(timeLeft <= 5) fill.style.background = '#ef4565';
    else if(timeLeft <= 10) fill.style.background = '#ffd166';
    
    if(timeLeft <= 0 && !hasAnswered && window.gameActive) {
      clearInterval(timer);
      timeoutAnswer();
    }
  }, 1000);
}

async function timeoutAnswer() {
  let snap = await db.ref(`rooms/${roomCode}`).once('value');
  let room = snap.val();
  if(!room || !room.roundActive) return;
  
  let answers = room.answers || { p1: false, p2: false };
  let myKey = myRole === 'host' ? 'p1' : 'p2';
  
  if(!answers[myKey]) {
    answers[myKey] = true;
    await db.ref(`rooms/${roomCode}/answers`).set(answers);
    
    let both = answers.p1 && answers.p2;
    let isOver = (currentRound >= totalRounds || !questionsList.length);
    
    if(both || isOver) {
      await db.ref(`rooms/${roomCode}/roundResult`).set({
        round: currentRound, correctAnswer: room.currentQuestion?.a,
        p1Answered: answers.p1, p2Answered: answers.p2,
        p1Correct: false, p2Correct: false,
        p1Earned: 0, p2Earned: 0
      });
      await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
      if(isOver) await db.ref(`rooms/${roomCode}`).update({ status: 'finished' });
    }
  }
}

async function submitAnswer(answer) {
  if(hasAnswered) return;
  
  let snap = await db.ref(`rooms/${roomCode}`).once('value');
  let room = snap.val();
  if(!room || !room.currentQuestion || room.currentQuestion.round !== currentRound) return;
  
  let answers = room.answers || { p1: false, p2: false };
  let myKey = myRole === 'host' ? 'p1' : 'p2';
  if(answers[myKey]) return;
  
  clearInterval(timer);
  hasAnswered = true;
  
  let isCorrect = (answer === room.currentQuestion.a);
  let points = isCorrect ? 10 : 0;
  
  answers[myKey] = true;
  
  // تحديث النتيجة
  let newP1Score = room.p1Score, newP2Score = room.p2Score;
  if(myRole === 'host') newP1Score += points;
  else newP2Score += points;
  
  await db.ref(`rooms/${roomCode}`).update({
    answers: answers,
    p1Score: newP1Score,
    p2Score: newP2Score
  });
  
  showNotification(isCorrect ? `✅ صحيح! +${points}` : `❌ خطأ! الإجابة: ${room.currentQuestion.a}`, isCorrect ? 'success' : 'error');
  
  let both = answers.p1 && answers.p2;
  let isOver = (currentRound >= totalRounds || !questionsList.length);
  
  if(both || isOver) {
    await db.ref(`rooms/${roomCode}/roundResult`).set({
      round: currentRound, correctAnswer: room.currentQuestion.a,
      p1Answered: answers.p1, p2Answered: answers.p2,
      p1Correct: answers.p1 && (myRole === 'host' ? isCorrect : false),
      p2Correct: answers.p2 && (myRole === 'guest' ? isCorrect : false),
      p1Earned: answers.p1 && (myRole === 'host' ? points : 0),
      p2Earned: answers.p2 && (myRole === 'guest' ? points : 0)
    });
    await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
    if(isOver) await db.ref(`rooms/${roomCode}`).update({ status: 'finished' });
  }
  
  // تعطيل الأزرار
  document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
  document.getElementById('hint-btn').disabled = true;
}

function showRoundResult(result) {
  waitingNext = true;
  
  // إظهار الإجابة الصحيحة
  document.querySelectorAll('.choice-btn').forEach(btn => {
    if(btn.innerHTML === result.correctAnswer) {
      btn.classList.add('correct-highlight');
    }
    btn.disabled = true;
  });
  
  setTimeout(() => {
    waitingNext = false;
    if(myRole === 'host') sendNextQuestion();
  }, 2500);
}

function useHint() {
  if(hintUsed || hasAnswered || !currentQuestion) return;
  hintUsed = true;
  document.getElementById('hint-btn').disabled = true;
  
  let btns = document.querySelectorAll('.choice-btn');
  let wrong = Array.from(btns).filter(btn => btn.innerHTML !== currentQuestion.a);
  let remove = wrong.slice(0, Math.floor(wrong.length / 2));
  remove.forEach(btn => { btn.style.opacity = '0.3'; btn.disabled = true; });
  showNotification('💡 تم حذف إجابتين', 'info');
}

function listenToChat() {
  if(chatRef) chatRef.off();
  chatRef = db.ref(`rooms/${roomCode}/chat`);
  chatRef.on('child_added', (snap) => {
    let msg = snap.val();
    if(msg) {
      let container = document.getElementById('chat-messages');
      let div = document.createElement('div');
      div.className = `chat-message ${msg.sender === myName ? 'me' : 'them'}`;
      div.innerHTML = msg.sender === myName ? msg.text : `${msg.sender}: ${msg.text}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  });
}

async function sendChat() {
  let input = document.getElementById('chat-input');
  let text = input.value.trim();
  if(!text) return;
  input.value = '';
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: text, timestamp: Date.now() });
}

async function sendReaction(emoji) {
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: emoji, timestamp: Date.now() });
}

function showOpponentLeft() {
  if(document.querySelector('.leave-overlay')) return;
  let div = document.createElement('div');
  div.className = 'leave-overlay';
  div.innerHTML = `<div class="leave-card"><div class="result-emoji">😞</div><div class="result-title">الخصم غادر</div><div class="result-sub">${myRole === 'host' ? 'الضيف' : 'المضيف'} انقطع الاتصال</div><button class="btn btn-primary" onclick="goHome()">🏠 الرئيسية</button></div>`;
  document.body.appendChild(div);
  if(timer) clearInterval(timer);
  window.gameActive = false;
}

function showResultScreen(finalScores) {
  window.gameActive = false;
  if(timer) clearInterval(timer);
  
  let myFinal = myRole === 'host' ? finalScores.p1Score : finalScores.p2Score;
  let theirFinal = myRole === 'host' ? finalScores.p2Score : finalScores.p1Score;
  let isWin = myFinal > theirFinal;
  
  let div = document.createElement('div');
  div.className = 'result-overlay';
  div.innerHTML = `<div class="result-card"><div class="result-emoji">${isWin ? '🏆' : '😢'}</div><div class="result-title">${isWin ? 'فزت!' : 'خسرت'}</div><div class="result-sub">${isWin ? `${myFinal} نقطة` : `${theirFinal} نقطة`}</div><div style="display:flex;justify-content:space-between;margin:20px 0"><div><div>${player1Name}</div><div style="font-size:32px;font-weight:900;${finalScores.p1Score >= finalScores.p2Score ? 'color:#ffd166' : ''}">${finalScores.p1Score}</div></div><div><div>${player2Name}</div><div style="font-size:32px;font-weight:900;${finalScores.p2Score >= finalScores.p1Score ? 'color:#ffd166' : ''}">${finalScores.p2Score}</div></div></div><button class="btn btn-primary" onclick="location.reload()">🔄 جديد</button><button class="btn btn-secondary" onclick="goHome()">🏠 الرئيسية</button></div>`;
  document.body.appendChild(div);
}

function leaveGame() { if(confirm('مغادرة اللعبة؟')) goHome(); }
function goHome() {
  if(roomRef) roomRef.off();
  if(chatRef) chatRef.off();
  if(timer) clearInterval(timer);
  if(roomCode && db) db.ref(`rooms/${roomCode}`).remove().catch(e=>console.log(e));
  document.querySelectorAll('.result-overlay, .leave-overlay').forEach(el => el.remove());
  window.gameActive = false;
  roomCode = '';
  showScreen('home');
  document.getElementById('join-code').value = '';
  document.getElementById('player-name').value = '';
}
async function leaveRoom() { if(confirm('مغادرة الغرفة؟')) { if(roomCode && db) await db.ref(`rooms/${roomCode}`).remove(); goHome(); } }
function copyCode() { navigator.clipboard.writeText(roomCode); showNotification('✅ تم النسخ', 'success'); }

// مستمع لنتيجة النهائية
db && db.ref(`rooms/${roomCode}/status`).on && db.ref(`rooms/${roomCode}/status`).on('value', (snap) => {
  if(snap.val() === 'finished' && window.gameActive) {
    db.ref(`rooms/${roomCode}`).once('value').then(s => showResultScreen(s.val()));
  }
});
</script>
</body>
</html>

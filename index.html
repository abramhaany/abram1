<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>تحدي الكتاب المقدس - البطولة</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0f0c1f 0%, #1a1535 100%);
  min-height: 100vh;
  color: #fff;
  padding: 15px;
}
.screen { display: none; max-width: 500px; margin: 0 auto; }
.screen.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.card {
  background: rgba(22,20,45,0.9);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 15px;
  border: 1px solid rgba(124,111,255,0.3);
}
h1 {
  font-size: 26px;
  text-align: center;
  background: linear-gradient(135deg, #7c6fff, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { text-align: center; color: #9090b0; font-size: 12px; margin: 8px 0 15px; }
input {
  width: 100%;
  padding: 14px;
  background: rgba(28,28,39,0.8);
  border: 1px solid rgba(124,111,255,0.3);
  border-radius: 16px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  margin: 8px 0;
  text-align: center;
}
input:focus { outline: none; border-color: #7c6fff; }
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary { background: linear-gradient(135deg, #7c6fff, #5b4fd4); color: white; }
.btn-secondary { background: rgba(28,28,39,0.9); color: white; border: 1px solid rgba(124,111,255,0.5); }
.btn-danger { background: linear-gradient(135deg, #ef4565, #c73552); color: white; }
.room-code {
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #ffd166, #ff9d4a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  padding: 10px;
}
.scoreboard { display: flex; gap: 12px; margin-bottom: 15px; }
.player-card {
  background: rgba(28,28,39,0.7);
  border-radius: 18px;
  padding: 10px;
  text-align: center;
  flex: 1;
  border: 1px solid rgba(124,111,255,0.2);
}
.player-card.answered { border-color: #06d6a0; box-shadow: 0 0 15px rgba(6,214,160,0.3); }
.player-name { font-size: 11px; color: #9090b0; }
.player-score { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #fff, #ffd166); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.timer-container { margin: 12px 0; }
.timer-bar { height: 6px; background: rgba(28,28,39,0.8); border-radius: 10px; overflow: hidden; }
.timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #06d6a0, #ffd166, #ef4565); transition: width 1s linear; }
.timer-text { text-align: center; font-size: 12px; margin-top: 5px; color: #ffd166; }
.q-card { background: rgba(28,28,39,0.7); border-radius: 20px; padding: 18px; margin: 12px 0; text-align: center; }
.q-text { font-size: 17px; font-weight: 700; line-height: 1.5; margin: 12px 0; }
.choice-btn {
  width: 100%;
  padding: 12px;
  background: rgba(19,19,26,0.8);
  border: 1px solid rgba(124,111,255,0.3);
  border-radius: 14px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  margin: 5px 0;
  cursor: pointer;
  transition: all 0.2s;
}
.choice-btn:hover:not(:disabled) { transform: translateX(-5px); border-color: #7c6fff; }
.choice-btn.correct { background: rgba(6,214,160,0.2); border-color: #06d6a0; }
.choice-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.powerups { display: flex; gap: 10px; margin: 10px 0; }
.powerup-btn {
  flex: 1;
  padding: 8px;
  background: rgba(28,28,39,0.9);
  border: 1px solid rgba(124,111,255,0.4);
  border-radius: 14px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
}
.powerup-btn:disabled { opacity: 0.3; }
.chat-container { background: rgba(28,28,39,0.6); border-radius: 18px; overflow: hidden; margin-top: 10px; }
.chat-messages { height: 80px; overflow-y: auto; padding: 8px; }
.chat-message { font-size: 11px; padding: 4px 8px; margin: 2px 0; border-radius: 10px; }
.chat-message.me { background: rgba(124,111,255,0.3); color: #7c6fff; text-align: right; }
.chat-message.them { background: rgba(19,19,26,0.8); color: #9090b0; text-align: left; }
.reactions { display: flex; gap: 6px; padding: 6px; border-top: 1px solid rgba(124,111,255,0.2); justify-content: center; }
.react-emoji { font-size: 18px; background: rgba(19,19,26,0.8); border: none; padding: 5px 8px; border-radius: 30px; cursor: pointer; }
.chat-input-row { display: flex; gap: 6px; padding: 6px; border-top: 1px solid rgba(124,111,255,0.2); }
.chat-input-row input { flex: 1; margin: 0; padding: 8px; font-size: 12px; text-align: right; }
.chat-input-row button { padding: 8px 12px; background: #7c6fff; border: none; border-radius: 12px; color: white; font-weight: 700; }
.result-overlay, .leave-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.result-card, .leave-card {
  background: rgba(28,28,39,0.95); border-radius: 28px; padding: 25px;
  text-align: center; width: 90%; max-width: 320px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 5px; }
.dot-waiting { background: #ffd166; animation: pulse 1s infinite; }
.dot-ready { background: #06d6a0; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.answer-status { font-size: 10px; margin-top: 4px; color: #ffd166; }
.round-info { text-align: center; background: rgba(28,28,39,0.7); border-radius: 14px; padding: 8px; min-width: 60px; }
.round-number { font-size: 18px; font-weight: 900; color: #7c6fff; }
.loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(124,111,255,0.3); border-top-color: #7c6fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none; }
.text-center { text-align: center; }
.divider { display: flex; align-items: center; gap: 8px; margin: 12px 0; color: #9090b0; }
.divider hr { flex: 1; height: 1px; background: rgba(124,111,255,0.3); border: none; }

/* قائمة المتصدرين */
.leaderboard-card {
  background: rgba(28,28,39,0.6);
  border-radius: 18px;
  padding: 12px;
  margin-top: 15px;
}
.leaderboard-title {
  font-size: 14px;
  font-weight: 700;
  color: #ffd166;
  text-align: center;
  margin-bottom: 10px;
}
.leaderboard-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(124,111,255,0.1);
  font-size: 13px;
}
.leaderboard-rank {
  width: 30px;
  font-weight: 700;
  color: #7c6fff;
}
.leaderboard-name {
  flex: 1;
  text-align: right;
}
.leaderboard-score {
  font-weight: 700;
  color: #ffd166;
}
.top-three {
  background: rgba(124,111,255,0.1);
  border-radius: 12px;
  margin: 2px 0;
}
</style>
</head>
<body>

<!-- الشاشة الرئيسية -->
<div id="screen-home" class="screen active">
  <div class="card">
    <div class="text-center"><div style="font-size: 45px;">📖✝️</div></div>
    <h1>تحدي الكتاب المقدس</h1>
    <div class="subtitle">العب مع أصدقائك - سجل اسمك في قائمة المتصدرين</div>
    <input type="text" id="player-name" placeholder="اسمك" maxlength="15">
    <button class="btn btn-primary" onclick="createRoom()">🏆 إنشاء غرفة جديدة</button>
    <div class="divider"><hr><span>أو</span><hr></div>
    <input type="text" id="join-code" placeholder="كود الغرفة (6 أحرف)" maxlength="6" style="text-align:center;font-size:20px;letter-spacing:4px">
    <button class="btn btn-secondary" onclick="joinRoom()">🎮 انضم إلى غرفة</button>
    
    <!-- قائمة المتصدرين العالمية -->
    <div class="leaderboard-card" id="leaderboard-home">
      <div class="leaderboard-title">🏆 قائمة المتصدرين العالميين 🏆</div>
      <div id="global-leaderboard-list">
        <div style="text-align:center;padding:10px"><div class="loading-spinner"></div><div style="margin-top:5px">جاري التحميل...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- شاشة الانتظار -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <div class="text-center">
      <div style="font-size: 35px;">🎮</div>
      <div style="color:#9090b0;font-size:12px">كود الغرفة</div>
      <div class="room-code" id="room-code-display">------</div>
      <button class="btn btn-secondary" onclick="copyCode()">📋 نسخ</button>
      <button class="btn btn-danger" onclick="leaveRoom()">❌ مغادرة</button>
    </div>
    <div class="scoreboard" style="margin-top:15px">
      <div class="player-card"><div id="p1-dot" class="status-dot dot-waiting"></div><div class="player-name">اللاعب 1</div><div id="p1-name" style="font-weight:700;font-size:14px">—</div></div>
      <div class="player-card"><div id="p2-dot" class="status-dot dot-waiting"></div><div class="player-name">اللاعب 2</div><div id="p2-name" style="font-weight:700;font-size:14px">في الانتظار...</div></div>
    </div>
    <div id="lobby-waiting"><div class="text-center" style="padding:25px"><div class="loading-spinner"></div><div style="margin-top:8px">⏳ في انتظار المنافس...</div></div></div>
    <div id="lobby-start" class="hidden"><button class="btn btn-primary" onclick="startGame()">🚀 ابدأ اللعبة</button></div>
  </div>
</div>

<!-- شاشة اللعبة -->
<div id="screen-game" class="screen">
  <div class="card" style="padding:12px">
    <div class="scoreboard">
      <div class="player-card" id="player1-card"><div class="player-name" id="name-p1">اللاعب 1</div><div class="player-score" id="score-p1">0</div><div id="p1-status" class="answer-status"></div></div>
      <div class="round-info"><div class="round-label">الجولة</div><div class="round-number" id="round-num">0/10</div></div>
      <div class="player-card" id="player2-card"><div class="player-name" id="name-p2">اللاعب 2</div><div class="player-score" id="score-p2">0</div><div id="p2-status" class="answer-status"></div></div>
    </div>
    <div class="timer-container"><div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div><div class="timer-text" id="timer-text">⏱️ 30 ثانية</div></div>
    <div class="q-card"><div class="q-text" id="q-text">✨ جاري تجهيز السؤال ✨</div><div id="choices-container"></div></div>
    <div class="powerups"><button class="powerup-btn" id="hint-btn" onclick="useHint()">💡 50/50</button></div>
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="reactions">
        <button class="react-emoji" onclick="sendReaction('🔥')">🔥</button>
        <button class="react-emoji" onclick="sendReaction('😂')">😂</button>
        <button class="react-emoji" onclick="sendReaction('👏')">👏</button>
        <button class="react-emoji" onclick="sendReaction('🎉')">🎉</button>
      </div>
      <div class="chat-input-row"><input type="text" id="chat-input" placeholder="رسالة..." onkeypress="if(event.key==='Enter') sendChat()"><button onclick="sendChat()">إرسال</button></div>
    </div>
    <button class="btn btn-danger" onclick="leaveGame()" style="margin-top:8px">🚪 مغادرة</button>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAZkQmg9k3RXoaCU3E2tP-jHcXIYwNpLJA",
  authDomain: "bero-a2b6b.firebaseapp.com",
  databaseURL: "https://bero-a2b6b-default-rtdb.firebaseio.com",
  projectId: "bero-a2b6b",
  storageBucket: "bero-a2b6b.firebasestorage.app",
  messagingSenderId: "959500982230",
  appId: "1:959500982230:web:0e292eec3297e363e77677"
};

// الأسئلة
const QUESTIONS = [
  { q: "كم عدد أسفار العهد القديم (البروتستانتي)؟", c: ["36", "39", "42", "45"], a: "39" },
  { q: "من هو أول إنسان خُلق؟", c: ["نوح", "إبراهيم", "آدم", "موسى"], a: "آدم" },
  { q: "في أي نهر تعمّد يسوع؟", c: ["الفرات", "النيل", "الأردن", "دجلة"], a: "الأردن" },
  { q: "كم يوماً صام يسوع في البرية؟", c: ["20", "30", "40", "50"], a: "40" },
  { q: "من كتب معظم رسائل العهد الجديد؟", c: ["يوحنا", "بطرس", "بولس", "لوقا"], a: "بولس" },
  { q: "أين وُلد يسوع؟", c: ["الناصرة", "أورشليم", "بيت لحم", "بيت عنيا"], a: "بيت لحم" },
  { q: "كم عدد تلاميذ يسوع؟", c: ["10", "11", "12", "13"], a: "12" },
  { q: "من بنى السفينة؟", c: ["نوح", "إبراهيم", "موسى", "داود"], a: "نوح" },
  { q: "أول معجزة ليسوع؟", c: ["إقامة لعازر", "إطعام 5000", "تحويل الماء لخمر", "شفاء أعمى"], a: "تحويل الماء لخمر" },
  { q: "قصة داود وجليات في أي سفر؟", c: ["التكوين", "المزامير", "صموئيل أول", "الملوك أول"], a: "صموئيل أول" },
  { q: "من هو الملك الذي بنى الهيكل؟", c: ["شاؤول", "داود", "سليمان", "حزقيا"], a: "سليمان" },
  { q: "من هو تلميذ يسوع الذي خانه؟", c: ["بطرس", "يوحنا", "يهوذا", "متى"], a: "يهوذا" },
  { q: "كم سنة جال بنو إسرائيل في البرية؟", c: ["20", "40", "60", "80"], a: "40" },
  { q: "من هو أول نبي؟", c: ["إبراهيم", "آدم", "نوح", "إدريس"], a: "آدم" }
];

// تهيئة Firebase
let db;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  console.log("✅ Firebase connected");
} catch(e) { console.error(e); }

// متغيرات اللعبة
let myName = "", myRole = "", roomCode = "";
let gameActive = false;
let currentQuestion = null;
let currentRound = 0;
let totalRounds = 10;
let remainingQuestions = [];
let hasAnswered = false;
let hintUsed = false;
let waitingNext = false;
let timerInterval = null;
let roomRef = null;
let chatRef = null;

// دوال مساعدة
function showNotification(msg, type) {
  let div = document.createElement('div');
  div.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(28,28,39,0.95);backdrop-filter:blur(12px);border:1px solid ${type === 'success' ? '#06d6a0' : type === 'error' ? '#ef4565' : '#7c6fff'};color:${type === 'success' ? '#06d6a0' : type === 'error' ? '#ef4565' : '#7c6fff'};padding:8px 16px;border-radius:30px;font-size:13px;font-weight:600;z-index:1000;white-space:nowrap;max-width:90vw;text-align:center`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}

function generateCode() {
  let chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', code = '';
  for(let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function shuffleArray(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// =============== قائمة المتصدرين ===============
async function updateLeaderboard(playerName, score) {
  if(!playerName || score === undefined) return;
  
  let leaderboardRef = db.ref('leaderboard');
  let snapshot = await leaderboardRef.orderByChild('score').once('value');
  
  let players = [];
  snapshot.forEach(child => {
    players.push({ name: child.key, score: child.val().score });
  });
  
  let existing = players.find(p => p.name === playerName);
  if(existing) {
    if(score > existing.score) {
      await leaderboardRef.child(playerName).set({ score: score, updatedAt: Date.now() });
    }
  } else {
    await leaderboardRef.child(playerName).set({ score: score, updatedAt: Date.now() });
  }
  
  loadGlobalLeaderboard();
}

async function loadGlobalLeaderboard() {
  let leaderboardRef = db.ref('leaderboard');
  let snapshot = await leaderboardRef.orderByChild('score').once('value');
  
  let players = [];
  snapshot.forEach(child => {
    players.push({ name: child.key, score: child.val().score });
  });
  
  players.sort((a, b) => b.score - a.score);
  let topPlayers = players.slice(0, 10);
  
  let container = document.getElementById('global-leaderboard-list');
  if(!container) return;
  
  if(topPlayers.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:10px;color:#9090b0">لا توجد نتائج بعد</div>';
    return;
  }
  
  let html = '';
  topPlayers.forEach((player, index) => {
    let rank = index + 1;
    let medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
    html += `
      <div class="leaderboard-item ${rank <= 3 ? 'top-three' : ''}">
        <div class="leaderboard-rank">${medal ? medal : rank}</div>
        <div class="leaderboard-name">${player.name}</div>
        <div class="leaderboard-score">${player.score} pts</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

setInterval(() => { loadGlobalLeaderboard(); }, 10000);
loadGlobalLeaderboard();

// =============== إنشاء غرفة ===============
async function createRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك', 'error'); return; }
  
  roomCode = generateCode();
  myRole = 'host';
  remainingQuestions = shuffleArray([...QUESTIONS]).slice(0, totalRounds);
  
  let roomData = {
    host: myName,
    guest: null,
    status: 'waiting',
    p1Score: 0,
    p2Score: 0,
    currentRound: 0,
    totalRounds: totalRounds,
    questions: remainingQuestions,
    roundActive: false,
    answers: { p1: false, p2: false },
    createdAt: Date.now()
  };
  
  await db.ref(`rooms/${roomCode}`).set(roomData);
  
  document.getElementById('room-code-display').innerHTML = roomCode;
  document.getElementById('p1-name').innerHTML = myName;
  document.getElementById('p1-dot').className = 'status-dot dot-ready';
  
  showScreen('lobby');
  listenToRoom();
  showNotification(`✅ الكود: ${roomCode}`, 'success');
}

// =============== انضمام ===============
async function joinRoom() {
  myName = document.getElementById('player-name').value.trim();
  if(!myName) { showNotification('أدخل اسمك', 'error'); return; }
  
  let code = document.getElementById('join-code').value.trim().toUpperCase();
  if(!code || code.length !== 6) { showNotification('كود غير صحيح', 'error'); return; }
  
  let snap = await db.ref(`rooms/${code}`).once('value');
  let room = snap.val();
  
  if(!room) { showNotification('غرفة غير موجودة', 'error'); return; }
  if(room.guest) { showNotification('الغرفة ممتلئة', 'error'); return; }
  if(room.status !== 'waiting') { showNotification('اللعبة بدأت بالفعل', 'error'); return; }
  
  roomCode = code;
  myRole = 'guest';
  
  await db.ref(`rooms/${roomCode}`).update({ guest: myName });
  
  showScreen('lobby');
  document.getElementById('room-code-display').innerHTML = roomCode;
  document.getElementById('p1-name').innerHTML = room.host;
  document.getElementById('p2-name').innerHTML = myName;
  document.getElementById('p2-dot').className = 'status-dot dot-ready';
  
  listenToRoom();
  showNotification('✅ انضممت!', 'success');
}

// =============== الاستماع للغرفة ===============
function listenToRoom() {
  if(roomRef) roomRef.off();
  roomRef = db.ref(`rooms/${roomCode}`);
  
  roomRef.on('value', (snapshot) => {
    let room = snapshot.val();
    
    if(!room) {
      if(gameActive) showOpponentLeft();
      else showNotification('تم حذف الغرفة', 'error');
      return;
    }
    
    // في اللوبي
    if(room.status === 'waiting' || room.status === 'ready') {
      if(myRole === 'host' && room.guest && !document.getElementById('p2-name').innerHTML.includes(room.guest)) {
        document.getElementById('p2-name').innerHTML = room.guest;
        document.getElementById('p2-dot').className = 'status-dot dot-ready';
        document.getElementById('lobby-waiting').classList.add('hidden');
        document.getElementById('lobby-start').classList.remove('hidden');
        showNotification(`🎉 ${room.guest} انضم!`, 'success');
      }
      
      if(myRole === 'guest' && room.guest === myName) {
        document.getElementById('lobby-waiting').innerHTML = '<div class="text-center" style="padding:25px;color:#06d6a0">✅ جاهز! في انتظار بدء المضيف...</div>';
      }
    }
    
    // بدء اللعبة
    if(room.status === 'playing' && !gameActive) {
      startGameUI(room);
    }
    
    // تحديث النقاط
    if(gameActive && room.p1Score !== undefined) {
      document.getElementById('score-p1').innerHTML = room.p1Score;
      document.getElementById('score-p2').innerHTML = room.p2Score;
    }
    
    // سؤال جديد
    if(room.roundActive === true && room.currentQuestion && room.currentQuestion.round !== currentRound && !waitingNext) {
      loadQuestion(room.currentQuestion, room.answers);
    }
    
    // نتيجة الجولة
    if(room.roundResult && room.roundResult.round === currentRound && !waitingNext && room.roundActive === false) {
      showRoundResult(room.roundResult);
    }
    
    // انتهاء اللعبة
    if(room.status === 'finished' && gameActive) {
      endGame(room);
    }
  });
}

// =============== بدء اللعبة ===============
function startGameUI(room) {
  gameActive = true;
  showScreen('game');
  currentRound = 0;
  hasAnswered = false;
  waitingNext = false;
  
  document.getElementById('name-p1').innerHTML = room.host;
  document.getElementById('name-p2').innerHTML = room.guest;
  document.getElementById('score-p1').innerHTML = room.p1Score;
  document.getElementById('score-p2').innerHTML = room.p2Score;
  document.getElementById('round-num').innerHTML = `0/${totalRounds}`;
  document.getElementById('q-text').innerHTML = '<div class="loading-spinner"></div><div style="margin-top:8px">جاري تحميل السؤال...</div>';
  document.getElementById('choices-container').innerHTML = '';
  
  listenToChat();
  
  if(myRole === 'host' && room.currentRound === 0) {
    setTimeout(() => sendFirstQuestion(), 500);
  }
}

async function sendFirstQuestion() {
  if(remainingQuestions.length === 0) {
    remainingQuestions = shuffleArray([...QUESTIONS]).slice(0, totalRounds);
  }
  sendNextQuestion();
}

async function sendNextQuestion() {
  if(remainingQuestions.length === 0) {
    await db.ref(`rooms/${roomCode}`).update({ status: 'finished' });
    return;
  }
  
  currentRound++;
  let q = remainingQuestions.shift();
  
  let questionData = {
    q: q.q,
    c: q.c,
    a: q.a,
    round: currentRound
  };
  
  await db.ref(`rooms/${roomCode}`).update({
    currentQuestion: questionData,
    questions: remainingQuestions,
    roundActive: true,
    answers: { p1: false, p2: false },
    roundResult: null
  });
}

// =============== عرض السؤال ===============
function loadQuestion(qData, answers) {
  currentQuestion = qData;
  currentRound = qData.round;
  hasAnswered = answers[myRole === 'host' ? 'p1' : 'p2'] || false;
  hintUsed = false;
  
  document.getElementById('round-num').innerHTML = `${currentRound}/${totalRounds}`;
  document.getElementById('q-text').innerHTML = qData.q;
  document.getElementById('hint-btn').disabled = hasAnswered;
  
  if(timerInterval) clearInterval(timerInterval);
  
  if(hasAnswered) {
    document.getElementById('choices-container').innerHTML = '<div class="text-center" style="padding:15px;color:#06d6a0;">✓ تمت الإجابة ✓</div>';
  } else {
    let container = document.getElementById('choices-container');
    container.innerHTML = '';
    qData.c.forEach(choice => {
      let btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerText = choice;
      btn.onclick = () => submitAnswer(choice);
      container.appendChild(btn);
    });
    startTimer(30);
  }
  
  updateAnswersUI(answers);
}

function updateAnswersUI(answers) {
  if(myRole === 'host') {
    document.getElementById('p1-status').innerHTML = answers.p1 ? '✓ أجبت' : '⏳';
    document.getElementById('p2-status').innerHTML = answers.p2 ? '✓ أجاب' : '⏳';
    document.getElementById('player1-card').classList.toggle('answered', answers.p1);
    document.getElementById('player2-card').classList.toggle('answered', answers.p2);
  } else {
    document.getElementById('p1-status').innerHTML = answers.p1 ? '✓ أجاب' : '⏳';
    document.getElementById('p2-status').innerHTML = answers.p2 ? '✓ أجبت' : '⏳';
    document.getElementById('player1-card').classList.toggle('answered', answers.p1);
    document.getElementById('player2-card').classList.toggle('answered', answers.p2);
  }
}

// =============== المؤقت ===============
function startTimer(sec) {
  let timeLeft = sec;
  let fill = document.getElementById('timer-fill');
  let text = document.getElementById('timer-text');
  fill.style.width = '100%';
  text.innerHTML = `⏱️ ${timeLeft} ثانية`;
  
  timerInterval = setInterval(() => {
    timeLeft--;
    let percent = (timeLeft / sec) * 100;
    fill.style.width = `${Math.max(0, percent)}%`;
    text.innerHTML = `⏱️ ${timeLeft} ثانية`;
    
    if(timeLeft <= 0 && !hasAnswered && gameActive) {
      clearInterval(timerInterval);
      handleTimeout();
    }
  }, 1000);
}

async function handleTimeout() {
  let snap = await db.ref(`rooms/${roomCode}`).once('value');
  let room = snap.val();
  if(!room || !room.roundActive) return;
  
  let answers = room.answers || { p1: false, p2: false };
  let myKey = myRole === 'host' ? 'p1' : 'p2';
  
  if(!answers[myKey]) {
    answers[myKey] = true;
    await db.ref(`rooms/${roomCode}/answers`).set(answers);
    
    let both = answers.p1 && answers.p2;
    let isOver = (currentRound >= totalRounds || remainingQuestions.length === 0);
    
    if(both || isOver) {
      await db.ref(`rooms/${roomCode}/roundResult`).set({
        round: currentRound,
        correctAnswer: room.currentQuestion?.a,
        p1Answered: answers.p1,
        p2Answered: answers.p2,
        p1Correct: false,
        p2Correct: false,
        p1Earned: 0,
        p2Earned: 0
      });
      await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
      if(isOver) await db.ref(`rooms/${roomCode}`).update({ status: 'finished' });
    }
  }
}

// =============== إجابة السؤال ===============
async function submitAnswer(answer) {
  if(hasAnswered) return;
  
  let snap = await db.ref(`rooms/${roomCode}`).once('value');
  let room = snap.val();
  if(!room || !room.currentQuestion || room.currentQuestion.round !== currentRound) return;
  
  let answers = room.answers || { p1: false, p2: false };
  let myKey = myRole === 'host' ? 'p1' : 'p2';
  if(answers[myKey]) return;
  
  clearInterval(timerInterval);
  hasAnswered = true;
  
  let isCorrect = (answer === room.currentQuestion.a);
  let points = isCorrect ? 10 : 0;
  
  answers[myKey] = true;
  
  let newP1 = room.p1Score;
  let newP2 = room.p2Score;
  if(myRole === 'host') newP1 += points;
  else newP2 += points;
  
  await db.ref(`rooms/${roomCode}`).update({
    answers: answers,
    p1Score: newP1,
    p2Score: newP2
  });
  
  showNotification(isCorrect ? `✅ صحيح! +${points}` : `❌ خطأ! الإجابة: ${room.currentQuestion.a}`, isCorrect ? 'success' : 'error');
  
  document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
  document.getElementById('hint-btn').disabled = true;
  
  let both = answers.p1 && answers.p2;
  let isOver = (currentRound >= totalRounds || remainingQuestions.length === 0);
  
  if(both || isOver) {
    await db.ref(`rooms/${roomCode}/roundResult`).set({
      round: currentRound,
      correctAnswer: room.currentQuestion.a,
      p1Answered: answers.p1,
      p2Answered: answers.p2,
      p1Correct: answers.p1 && (myRole === 'host' ? isCorrect : false),
      p2Correct: answers.p2 && (myRole === 'guest' ? isCorrect : false),
      p1Earned: answers.p1 && (myRole === 'host' ? points : 0),
      p2Earned: answers.p2 && (myRole === 'guest' ? points : 0)
    });
    await db.ref(`rooms/${roomCode}`).update({ roundActive: false });
    if(isOver) await db.ref(`rooms/${roomCode}`).update({ status: 'finished' });
  }
}

// =============== نتيجة الجولة ===============
function showRoundResult(result) {
  waitingNext = true;
  
  document.querySelectorAll('.choice-btn').forEach(btn => {
    if(btn.innerText === result.correctAnswer) {
      btn.classList.add('correct');
    }
    btn.disabled = true;
  });
  
  setTimeout(() => {
    waitingNext = false;
    if(myRole === 'host') {
      sendNextQuestion();
    }
  }, 2000);
}

// =============== 50/50 ===============
function useHint() {
  if(hintUsed || hasAnswered || !currentQuestion) return;
  hintUsed = true;
  document.getElementById('hint-btn').disabled = true;
  
  let btns = document.querySelectorAll('.choice-btn:not(:disabled)');
  let wrong = Array.from(btns).filter(btn => btn.innerText !== currentQuestion.a);
  let toRemove = wrong.slice(0, Math.floor(wrong.length / 2));
  toRemove.forEach(btn => {
    btn.style.opacity = '0.3';
    btn.disabled = true;
  });
  showNotification('💡 تم حذف إجابتين', 'info');
}

// =============== الشات ===============
function listenToChat() {
  if(chatRef) chatRef.off();
  chatRef = db.ref(`rooms/${roomCode}/chat`);
  chatRef.on('child_added', (snap) => {
    let msg = snap.val();
    if(msg) {
      let container = document.getElementById('chat-messages');
      let div = document.createElement('div');
      div.className = `chat-message ${msg.sender === myName ? 'me' : 'them'}`;
      div.innerText = msg.sender === myName ? msg.text : `${msg.sender}: ${msg.text}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
  });
}

async function sendChat() {
  let input = document.getElementById('chat-input');
  let text = input.value.trim();
  if(!text) return;
  input.value = '';
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: text, timestamp: Date.now() });
}

async function sendReaction(emoji) {
  await db.ref(`rooms/${roomCode}/chat`).push({ sender: myName, text: emoji, timestamp: Date.now() });
}

// =============== خروج ونتائج ===============
function showOpponentLeft() {
  if(document.querySelector('.leave-overlay')) return;
  let div = document.createElement('div');
  div.className = 'leave-overlay';
  div.innerHTML = `<div class="leave-card"><div style="font-size:50px;">😞</div><div style="font-size:22px;font-weight:900;margin:10px 0">الخصم غادر</div><div style="margin-bottom:15px">${myRole === 'host' ? 'الضيف' : 'المضيف'} انقطع اتصاله</div><button class="btn btn-primary" onclick="goHome()">🏠 الرئيسية</button></div>`;
  document.body.appendChild(div);
  if(timerInterval) clearInterval(timerInterval);
  gameActive = false;
}

async function endGame(room) {
  gameActive = false;
  if(timerInterval) clearInterval(timerInterval);
  
  let myFinal = myRole === 'host' ? room.p1Score : room.p2Score;
  let theirFinal = myRole === 'host' ? room.p2Score : room.p1Score;
  let isWin = myFinal > theirFinal;
  let isTie = myFinal === theirFinal;
  
  // حفظ النتيجة في قائمة المتصدرين
  await updateLeaderboard(myName, myFinal);
  
  let div = document.createElement('div');
  div.className = 'result-overlay';
  div.innerHTML = `<div class="result-card">
    <div style="font-size:50px;">${isTie ? '🤝' : (isWin ? '🏆' : '😢')}</div>
    <div style="font-size:24px;font-weight:900;margin:10px 0">${isTie ? 'تعادل!' : (isWin ? 'فزت!' : 'خسرت')}</div>
    <div style="margin-bottom:15px">${isTie ? 'لعبة رائعة' : (isWin ? `${myFinal} نقطة` : `${theirFinal} نقطة`)}</div>
    <div style="display:flex;justify-content:space-between;margin:15px 0">
      <div><div style="font-size:12px">${room.host}</div><div style="font-size:28px;font-weight:900;${room.p1Score >= room.p2Score ? 'color:#ffd166' : 'color:#fff'}">${room.p1Score}</div></div>
      <div><div style="font-size:12px">${room.guest}</div><div style="font-size:28px;font-weight:900;${room.p2Score >= room.p1Score ? 'color:#ffd166' : 'color:#fff'}">${room.p2Score}</div></div>
    </div>
    <button class="btn btn-primary" onclick="location.reload()">🔄 لعب مرة أخرى</button>
    <button class="btn btn-secondary" onclick="goHome()">🏠 الرئيسية</button>
  </div>`;
  document.body.appendChild(div);
}

function leaveGame() { if(confirm('مغادرة اللعبة؟')) goHome(); }

function goHome() {
  if(roomRef) roomRef.off();
  if(chatRef) chatRef.off();
  if(timerInterval) clearInterval(timerInterval);
  if(roomCode && db) db.ref(`rooms/${roomCode}`).remove().catch(e=>console.log(e));
  document.querySelectorAll('.result-overlay, .leave-overlay').forEach(el => el.remove());
  gameActive = false;
  roomCode = "";
  showScreen('home');
  document.getElementById('join-code').value = "";
  document.getElementById('player-name').value = "";
  loadGlobalLeaderboard();
}

async function leaveRoom() { 
  if(confirm('مغادرة الغرفة؟')) { 
    if(roomCode && db) await db.ref(`rooms/${roomCode}`).remove(); 
    goHome(); 
  } 
}

function copyCode() { 
  navigator.clipboard.writeText(roomCode); 
  showNotification('✅ تم نسخ الكود', 'success'); 
}
</script>
